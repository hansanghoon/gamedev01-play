<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>꿈속 탐험가</title>
  <style>
    :root {
      --atk: #e03030;  --atk-bg: #1a0606;  --atk-glow: rgba(220,50,50,0.55);
      --def: #2255ee;  --def-bg: #04091e;  --def-glow: rgba(40,100,240,0.55);
      --skl: #9922dd;  --skl-bg: #10061e;  --skl-glow: rgba(150,40,220,0.55);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #03030f;
      color: #e4dcff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none;
    }

    #game {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh;
      padding: 10px 16px 6px;
      gap: 7px;
    }

    /* ══ TOP BAR ══ */
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(150,100,255,0.18);
      border-radius: 10px;
      padding: 7px 14px;
      gap: 12px;
    }

    #relic-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    #relic-label {
      font-size: 11px;
      color: #9977cc;
      white-space: nowrap;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    #relics {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    #relics-empty {
      font-size: 11px;
      color: #443366;
      font-style: italic;
    }

    .relic-badge {
      background: linear-gradient(135deg, #2a1555, #1e0e40);
      border: 1px solid #7744cc;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: help;
      position: relative;
      white-space: nowrap;
      box-shadow: 0 0 8px rgba(140,80,240,0.3);
    }
    .relic-badge:hover { border-color: #bb88ff; box-shadow: 0 0 14px rgba(180,120,255,0.5); }
    .relic-badge:hover::after {
      content: attr(data-desc);
      position: absolute; top: 120%; left: 0;
      background: #0e0c28; border: 1px solid #7744cc;
      padding: 6px 12px; border-radius: 8px;
      white-space: nowrap; z-index: 500; font-size: 11px; color: #c9a7ff;
    }

    #right-info {
      display: flex; gap: 16px; align-items: center;
    }
    #gold-info {
      font-size: 13px; color: #ffd76a;
      white-space: nowrap; font-weight: 600;
    }
    #floor-info {
      font-size: 13px; color: #9977cc;
      white-space: nowrap;
      letter-spacing: .03em;
    }

    /* ══ LOG ══ */
    #log {
      font-size: 13px; color: #c0aae8;
      text-align: center; min-height: 20px;
      letter-spacing: .02em;
    }

    /* ══ COMBAT AREA ══ */
    #combat-area {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    /* 전투 패널 공통 */
    .battle-panel {
      flex: 1; max-width: 280px;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      position: relative;
    }
    .battle-panel.enemy {
      background: linear-gradient(160deg, rgba(80,10,10,0.45), rgba(10,4,18,0.7));
      border: 1px solid rgba(200,50,50,0.3);
      box-shadow: inset 0 0 40px rgba(160,20,20,0.15), 0 0 20px rgba(160,20,20,0.1);
      cursor: pointer;
      min-width: 140px;
    }
    .battle-panel.enemy.targeted {
      border: 2px solid #ffcc44;
      box-shadow: inset 0 0 40px rgba(160,20,20,0.15), 0 0 22px rgba(255,200,60,0.35);
    }
    .battle-panel.enemy.compact { padding: 10px 10px; gap: 6px; max-width: 200px; }
    .battle-panel.enemy.compact .panel-sprite { font-size: 44px; }
    .battle-panel.enemy.compact .panel-name  { font-size: 12px; }
    .battle-panel.enemy.compact .intent-box  { font-size: 11px; padding: 5px 8px; }

    #enemy-area {
      display: flex; gap: 12px;
      flex: 2; min-width: 0;
      justify-content: center; align-items: stretch;
    }
    .battle-panel.player {
      background: linear-gradient(160deg, rgba(10,20,80,0.45), rgba(4,8,18,0.7));
      border: 1px solid rgba(50,100,240,0.3);
      box-shadow: inset 0 0 40px rgba(30,60,200,0.15), 0 0 20px rgba(30,60,200,0.1);
    }

    .panel-sprite {
      font-size: 80px; line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    }
    .panel-sprite img, .char-sprite img {
      image-rendering: pixelated;
      display: block;
    }
    .panel-name {
      font-size: 14px; font-weight: 600;
      color: #d4bfff; text-align: center;
      letter-spacing: .04em;
    }

    /* HP 바 */
    .hp-wrap { width: 100%; }
    .hp-row {
      display: flex; justify-content: space-between;
      font-size: 12px; color: #8877aa; margin-bottom: 5px;
    }
    .hp-row span:last-child { font-weight: 600; color: #bbaadd; }
    .hp-bar {
      height: 12px; background: rgba(0,0,0,0.5);
      border-radius: 6px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .hp-fill {
      height: 100%; border-radius: 6px;
      transition: width 0.3s ease;
    }
    .hp-fill.enemy-fill {
      background: linear-gradient(90deg, #aa1111, #ee4422);
      box-shadow: 0 0 8px rgba(200,50,30,0.6);
    }
    .hp-fill.player-fill {
      background: linear-gradient(90deg, #1133cc, #2277ff);
      box-shadow: 0 0 8px rgba(40,100,240,0.6);
    }

    /* 적 정보 */
    .enemy-block-row {
      font-size: 13px; color: #88aaff; min-height: 18px;
    }
    .intent-box {
      width: 100%;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(200,100,100,0.3);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px; text-align: center;
      color: #ffccbb; letter-spacing: .03em;
    }

    /* 플레이어 스탯 */
    .stats-row { display: flex; gap: 14px; margin-top: 4px; }
    .stat-orb {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px;
    }
    .orb-circle {
      width: 54px; height: 54px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800;
    }
    .orb-circle.energy {
      background: radial-gradient(circle at 35% 35%, #ffee99, #cc9900);
      box-shadow: 0 0 16px rgba(240,200,0,0.7), 0 0 4px rgba(240,200,0,0.4);
      color: #1a0a00;
    }
    .orb-circle.block {
      background: radial-gradient(circle at 35% 35%, #88ccff, #2255cc);
      box-shadow: 0 0 16px rgba(60,120,240,0.6), 0 0 4px rgba(60,120,240,0.3);
      color: #fff;
    }
    .orb-label { font-size: 10px; color: #7799bb; letter-spacing: .06em; text-transform: uppercase; }

    /* 중앙 VS 구분 */
    #vs-col {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; width: 50px; flex-shrink: 0;
    }
    .vs-line {
      width: 1px; flex: 1;
      background: linear-gradient(to bottom, transparent, rgba(120,80,200,0.4), transparent);
    }
    .vs-icon { font-size: 22px; color: #5533aa; }

    /* ══ 컨트롤 ══ */
    #controls {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px;
    }
    .pile-info { font-size: 12px; color: #554477; letter-spacing: .03em; }

    #end-turn-btn {
      background: linear-gradient(135deg, #3b1575, #6030b5);
      border: 2px solid #9966ee;
      color: #f0e8ff;
      padding: 11px 30px;
      border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: .05em;
      box-shadow: 0 0 18px rgba(140,80,240,0.4);
      transition: all 0.15s;
    }
    #end-turn-btn:hover {
      background: linear-gradient(135deg, #5520a0, #7840cc);
      box-shadow: 0 0 28px rgba(160,100,255,0.6);
      transform: scale(1.04);
    }

    /* ══ 손패 ══ */
    #hand {
      display: flex; gap: 10px;
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
      min-height: 140px;
      padding-bottom: 2px;
    }

    /* ── 카드 ── */
    .card {
      width: 108px; height: 155px;
      border-radius: 12px;
      border: 2px solid #444;
      display: flex; flex-direction: column;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.13s ease, box-shadow 0.13s ease;
      user-select: none; flex-shrink: 0;
    }
    .card:hover {
      transform: translateY(-20px) scale(1.07);
      z-index: 30;
    }
    .card.unaffordable { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.4); }
    .card.unaffordable:hover { transform: none; box-shadow: none; }

    /* 카드 타입별 스타일 */
    .card.attack {
      background: linear-gradient(170deg, #220808 0%, #3a1010 60%, #1a0505 100%);
      border-color: #cc2222;
    }
    .card.attack:hover { box-shadow: 0 8px 30px var(--atk-glow), 0 0 0 1px #cc2222; }
    .card.defense {
      background: linear-gradient(170deg, #060e26 0%, #0e1e44 60%, #040818 100%);
      border-color: #2255cc;
    }
    .card.defense:hover { box-shadow: 0 8px 30px var(--def-glow), 0 0 0 1px #2255cc; }
    .card.skill {
      background: linear-gradient(170deg, #100620 0%, #200a38 60%, #0c0418 100%);
      border-color: #8822cc;
    }
    .card.skill:hover { box-shadow: 0 8px 30px var(--skl-glow), 0 0 0 1px #8822cc; }

    /* 카드 헤더 (아이콘 영역) */
    .card-header {
      height: 68px; width: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .card.attack  .card-header { background: linear-gradient(180deg, rgba(200,40,40,0.25), transparent); }
    .card.defense .card-header { background: linear-gradient(180deg, rgba(40,80,220,0.25), transparent); }
    .card.skill   .card-header { background: linear-gradient(180deg, rgba(140,40,220,0.25), transparent); }

    .card-icon { font-size: 30px; line-height: 1; }
    .card-type-label {
      font-size: 8px; letter-spacing: .1em; text-transform: uppercase;
      opacity: 0.55;
    }
    .card.attack  .card-type-label { color: #ff8888; }
    .card.defense .card-type-label { color: #88aaff; }
    .card.skill   .card-type-label { color: #cc88ff; }

    /* 카드 본문 */
    .card-body {
      flex: 1; padding: 7px 7px 6px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .card-name {
      font-size: 12px; font-weight: 700;
      text-align: center; color: #eee;
      letter-spacing: .02em; line-height: 1.2;
    }
    .card-desc {
      font-size: 10px; color: #998dbb;
      text-align: center; line-height: 1.4;
      flex: 1;
    }
    .card-exhaust { font-size: 9px; color: #ff9944; text-align: center; }

    /* 코스트 뱃지 */
    .card-cost {
      position: absolute; top: 5px; left: 5px;
      width: 22px; height: 22px;
      background: radial-gradient(circle at 35% 35%, #ffee66, #cc9900);
      color: #1a0a00; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900;
      box-shadow: 0 0 8px rgba(220,180,0,0.7);
      z-index: 2;
    }

    /* ══ 오버레이 ══ */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(3px);
      z-index: 100; align-items: center; justify-content: center;
    }
    #overlay.active { display: flex; }

    .overlay-box {
      background: linear-gradient(160deg, #0e0c28, #160e30);
      border: 2px solid rgba(120,80,220,0.6);
      border-radius: 18px;
      padding: 32px;
      max-width: 640px; width: 92%;
      text-align: center;
      box-shadow: 0 0 60px rgba(100,60,200,0.3);
    }

    /* ── 상점·이벤트·카드 제거 ── */
    .price-tag {
      font-size: 12px; color: #ffd76a; font-weight: 600;
      text-align: center; margin-top: 6px;
    }
    .shop-item { display: flex; flex-direction: column; align-items: center; }
    .shop-item.sold { opacity: 0.3; pointer-events: none; }
    .shop-item.poor .card, .shop-item.poor .relic-choice { opacity: 0.45; cursor: not-allowed; }
    .deck-grid {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
      max-height: 350px; overflow-y: auto;
      margin: 12px 0; padding: 4px;
    }
    .card.mini { width: 86px; height: 124px; }
    .card.mini .card-header { height: 50px; }
    .card.mini .card-icon { font-size: 22px; }
    .card.mini .card-name { font-size: 10px; }
    .card.mini .card-desc { font-size: 8px; }
    .card.mini .card-cost { width: 18px; height: 18px; font-size: 10px; }
    .card.mini:hover { transform: translateY(-6px) scale(1.05); }

    /* ── 지도 ── */
    .map-scroll {
      max-height: 60vh; overflow-y: auto;
      display: flex; justify-content: center;
      margin: 10px 0;
    }
    .map-wrap { position: relative; flex-shrink: 0; }
    .map-node {
      position: absolute;
      width: 42px; height: 42px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid #443366;
      background: #14102e;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
      user-select: none;
    }
    .map-node.sel {
      border-color: #ffcc44;
      background: #2a2040;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(255,200,60,0.55);
      animation: node-pulse 1.1s ease-in-out infinite;
    }
    .map-node.sel:hover { transform: translate(-50%, -50%) scale(1.18); }
    .map-node.cur {
      border-color: #66ddff;
      box-shadow: 0 0 14px rgba(80,200,255,0.55);
    }
    .map-node.done { opacity: 0.55; border-color: #886644; }
    .map-node.off  { opacity: 0.28; }
    @keyframes node-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,200,60,0.35); }
      50%      { box-shadow: 0 0 22px rgba(255,200,60,0.75); }
    }
    .overlay-title {
      font-size: 24px; font-weight: 700;
      color: #d4b8ff; margin-bottom: 10px;
      letter-spacing: .04em;
    }
    .overlay-sub {
      font-size: 13px; color: #887799;
      margin-bottom: 18px; line-height: 1.7;
    }

    .reward-cards {
      display: flex; gap: 16px;
      justify-content: center; flex-wrap: wrap; margin: 12px 0;
    }
    .reward-card { cursor: pointer; transition: transform 0.13s; }
    .reward-card:hover { transform: scale(1.09); }

    .relic-choices { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
    .relic-choice {
      background: linear-gradient(160deg, #1e1040, #28104a);
      border: 2px solid rgba(120,80,220,0.5);
      border-radius: 12px; padding: 16px 20px;
      cursor: pointer; transition: transform 0.13s, border-color 0.13s, box-shadow 0.13s;
      min-width: 150px;
    }
    .relic-choice:hover {
      transform: scale(1.06); border-color: #aa88ff;
      box-shadow: 0 0 20px rgba(160,120,255,0.35);
    }
    .relic-choice-name { font-size: 17px; margin-bottom: 8px; }
    .relic-choice-desc { font-size: 12px; color: #9988cc; line-height: 1.5; }

    .skip-btn {
      background: transparent; border: 1px solid #332255;
      color: #665577; padding: 8px 20px; border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 13px;
      margin-top: 12px; transition: all 0.13s;
    }
    .skip-btn:hover { border-color: #7755aa; color: #aa88cc; }

    .action-btn {
      background: linear-gradient(135deg, #3b1575, #6030b5);
      border: 2px solid #9966ee; color: #f0e8ff;
      padding: 13px 32px; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      font-family: inherit; margin-top: 16px;
      box-shadow: 0 0 20px rgba(140,80,240,0.4);
      transition: all 0.13s;
    }
    .action-btn:hover { background: linear-gradient(135deg, #5520a0, #7840cc); box-shadow: 0 0 30px rgba(160,100,255,0.6); }

    /* ── 캐릭터 선택 ── */
    .char-select {
      display: flex; gap: 18px; justify-content: center;
      flex-wrap: wrap; margin: 16px 0 8px;
    }
    .char-card-sel {
      width: 148px;
      background: linear-gradient(160deg, #0e0c28, #160e30);
      border: 2px solid #332255;
      border-radius: 16px;
      padding: 20px 14px 16px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      transition: transform 0.13s, border-color 0.13s, box-shadow 0.13s;
    }
    .char-card-sel:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 8px 28px rgba(160,100,255,0.4);
    }
    .char-card-sel.explorer:hover { border-color: #2255cc; box-shadow: 0 8px 28px rgba(40,100,240,0.45); }
    .char-card-sel.dreamer:hover  { border-color: #9922dd; box-shadow: 0 8px 28px rgba(150,40,220,0.45); }
    .char-card-sel.dark:hover     { border-color: #cc2222; box-shadow: 0 8px 28px rgba(220,50,50,0.45); }
    .char-sprite  { font-size: 52px; line-height: 1; }
    .char-sel-name { font-size: 17px; font-weight: 700; color: #e0d4ff; letter-spacing:.04em; }
    .char-sel-hp   { font-size: 12px; color: #aa88bb; }
    .char-sel-tag  { font-size: 11px; color: #7766aa; text-align:center; letter-spacing:.03em; }
    .char-sel-desc {
      font-size: 11px; color: #665588; text-align:center;
      line-height:1.5; border-top:1px solid rgba(255,255,255,0.06);
      padding-top:8px; margin-top:2px;
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="game">

  <!-- ── 상단 바 ── -->
  <div id="top-bar">
    <div id="relic-panel">
      <span id="relic-label">✨ 유물</span>
      <div id="relics"></div>
      <span id="relics-empty">없음</span>
    </div>
    <div id="right-info">
      <div id="gold-info">💰 0</div>
      <div id="floor-info"></div>
    </div>
  </div>

  <!-- ── 로그 ── -->
  <div id="log"></div>

  <!-- ── 전투 영역 ── -->
  <div id="combat-area">

    <!-- 플레이어 패널 (왼쪽) -->
    <div class="battle-panel player">
      <div class="panel-sprite" id="player-icon"></div>
      <div class="panel-name"   id="player-name">탐험가</div>
      <div class="hp-wrap">
        <div class="hp-row">
          <span>HP</span>
          <span id="player-hp-text"></span>
        </div>
        <div class="hp-bar">
          <div class="hp-fill player-fill" id="player-hp-fill" style="width:100%"></div>
        </div>
      </div>
      <div class="enemy-block-row" id="player-str"></div>
      <div class="stats-row">
        <div class="stat-orb">
          <div class="orb-circle energy" id="energy-val">3</div>
          <div class="orb-label">에너지</div>
        </div>
        <div class="stat-orb">
          <div class="orb-circle block" id="block-val">0</div>
          <div class="orb-label">방어막</div>
        </div>
      </div>
    </div>

    <!-- 중앙 구분선 -->
    <div id="vs-col">
      <div class="vs-line"></div>
      <div class="vs-icon">⚡</div>
      <div class="vs-line"></div>
    </div>

    <!-- 적 영역 (오른쪽, 여러 마리 가능) -->
    <div id="enemy-area"></div>
  </div>

  <!-- ── 컨트롤 ── -->
  <div id="controls">
    <div class="pile-info" id="pile-info"></div>
    <button id="end-turn-btn" onclick="endTurn()">턴 종료 ▶</button>
  </div>

  <!-- ── 손패 ── -->
  <div id="hand"></div>
</div>

<!-- ── 오버레이 ── -->
<div id="overlay">
  <div class="overlay-box" id="overlay-box"></div>
</div>

<script src="dream-sprites.js"></script>
<script>
// ════════════════════════════════════════════
// 데이터

// 도트 스프라이트 데이터는 games/dream-sprites.js 에서 로드됨
//   (SPRITE_DATA — 캐릭터 3종 + 적 12종, 갤러리와 공용)

// dream-sprites.js 가 없어도 게임이 멈추지 않도록 안전장치
if(typeof SPRITE_DATA === "undefined") window.SPRITE_DATA = {};

const SPRITE_IMG = {};
(function buildSprites() {
  const SCALE = 6;
  for(const [id, sp] of Object.entries(SPRITE_DATA)){
    const cv = document.createElement("canvas");
    cv.width  = sp.rows[0].length * SCALE;
    cv.height = sp.rows.length * SCALE;
    const cx = cv.getContext("2d");
    sp.rows.forEach((row, y) => {
      for(let x = 0; x < row.length; x++){
        const col = sp.pal[row[x]];
        if(!col) continue;
        cx.fillStyle = col;
        cx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
      }
    });
    SPRITE_IMG[id] = cv.toDataURL();
  }
})();

// 도트가 있으면 이미지, 없으면 이모지(fallback)로 대체
function spriteImg(id, width, fallback) {
  if(!SPRITE_IMG[id]) return fallback ? `<span style="font-size:${width*0.7}px">${fallback}</span>` : "";
  return `<img src="${SPRITE_IMG[id]}" width="${width}" alt="">`;
}

// 전투 적 그룹: tier 1 = 아래쪽(쉬움), tier 2 = 위쪽(어려움)
const TIER_GROUPS = {
  1: [ ["shadow"], ["testpaper"], ["sock"], ["choco"], ["broccoli"] ],
  2: [ ["giantfriend"], ["piano"], ["octopus"], ["fridge"], ["sock","sock"], ["choco"] ],
};

// 지도 = 줄(row)들의 배열. 아래(0번 줄)에서 위(보스)로 올라간다.
// 각 노드는 다음 줄의 next 노드들로만 갈 수 있다.
function buildMap() {
  const mixType = () => {
    const r = Math.random();
    return r < 0.40 ? "combat" : r < 0.65 ? "event" : r < 0.85 ? "rest" : "shop";
  };
  const mk  = (type, tier) => ({ type, tier, next: [] });
  const mix = (n, tier) => Array.from({length:n}, () => mk(mixType(), tier));

  const rows = [
    [mk("combat",1), mk("combat",1)],           // 시작: 전투 2갈래
    mix(3, 1),
    mix(3, 1),
    [mk("combat",2), mk("combat",2)],           // 중간 관문 전투
    mix(3, 2),
    [mk("combat",2), mk("combat",2), mk("combat",2)],
    [mk("rest",2), mk("rest",2)],               // 보스 전 휴식 (고정)
    [mk("boss",2)],
  ];

  // 연결선 만들기 (선이 서로 꼬이지 않게 비율로 연결)
  for(let r = 0; r < rows.length - 1; r++){
    const a = rows[r], b = rows[r+1];
    a.forEach((node, i) => {
      const j = a.length === 1 ? 0
        : Math.round(i * (b.length - 1) / (a.length - 1));
      node.next.push(j);
      // 60% 확률로 옆 노드로 가는 갈림길 추가
      const extra = j + (Math.random() < 0.5 ? -1 : 1);
      if(b[extra] && Math.random() < 0.6) node.next.push(extra);
    });
    // 들어오는 길이 없는 노드는 가장 가까운 노드와 연결
    b.forEach((_, j) => {
      if(a.some(n => n.next.includes(j))) return;
      let bi = 0, bd = Infinity;
      a.forEach((n, i) => {
        const d = Math.abs(i * (b.length - 1) / Math.max(1, a.length - 1) - j);
        if(d < bd){ bd = d; bi = i; }
      });
      a[bi].next.push(j);
    });
    a.forEach(n => n.next.sort((x, y) => x - y));
  }
  return rows;
}

function zoneName(row) {
  if(row < 0)  return "꿈의 입구";
  if(row <= 2) return "그림자 마을";
  if(row <= 5) return "꿈의 학교";
  return "알람시계 탑";
}

function poolIdx() {
  const r = GS.pos.row;
  return r <= 2 ? 0 : r <= 5 ? 1 : 2;
}

    deck:   { draw:[], discard:[], exhaust:[] },

function showCharSelect() {
  GS.ovType = "char";
  const cards = Object.values(CHARACTERS).map(ch => `
    <div class="char-card-sel ${ch.id}" onclick="selectChar('${ch.id}')">
      <div class="char-sprite">${spriteImg(ch.id, 64, ch.icon)}</div>
      <div class="char-sel-name">${ch.name}</div>
      <div class="char-sel-hp">❤️ ${ch.hp}</div>
      <div class="char-sel-tag">${ch.tag}</div>
      <div class="char-sel-desc">${ch.desc.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
  showOv(`
    <div class="overlay-title">꿈속 탐험가 🌙</div>
    <div class="overlay-sub">누가 꿈속으로 들어갈까요?</div>
    <div class="char-select">${cards}</div>
  `);
}

function selectChar(charId) {
  const ch = CHARACTERS[charId];
  GS.player.charId = charId;
  GS.player.hp     = ch.hp;
  GS.player.maxHp  = ch.hp;
  GS.player.gold   = 15;
  GS.player.deck   = [...ch.deck];
  GS.map  = buildMap();
  GS.pos  = { row:-1, idx:0 };
  GS.path = [];
  showMap();
}

// ── 지도 화면 ──
function nodeSelectable(r, i) {
  if(GS.pos.row < 0) return r === 0;  // 시작: 맨 아랫줄 아무 곳이나
  const cur = GS.map[GS.pos.row][GS.pos.idx];
  return r === GS.pos.row + 1 && cur.next.includes(i);
}

function showMap() {
  closeOv();
  GS.ovType = "map";
  GS.c.enemies = [];
  GS.c.hand = [];
  render();

  const rows = GS.map;
  const W = 500, RH = 58, H = rows.length * RH;
  const px = (r, i) => (i + 1) / (rows[r].length + 1) * W;
  const py = (r) => H - (r * RH + RH / 2);
  const icons = { combat:"⚔️", rest:"🔥", event:"❓", shop:"🛒", boss:"👑" };

  let lines = "";
  for(let r = 0; r < rows.length - 1; r++){
    rows[r].forEach((n, i) => n.next.forEach(j => {
      const onPath = GS.path.some(([pr,pi]) => pr === r && pi === i)
                  && GS.path.some(([pr,pi]) => pr === r+1 && pi === j);
      lines += `<line x1="${px(r,i)}" y1="${py(r)}" x2="${px(r+1,j)}" y2="${py(r+1)}"
        stroke="${onPath ? "rgba(255,204,68,0.75)" : "rgba(130,90,220,0.3)"}" stroke-width="${onPath ? 3 : 2}"/>`;
    }));
  }

  let nodes = "";
  rows.forEach((row, r) => row.forEach((n, i) => {
    const visited = GS.path.some(([pr,pi]) => pr === r && pi === i);
    const isCur   = r === GS.pos.row && i === GS.pos.idx;
    const sel     = nodeSelectable(r, i);
    let cls = "map-node";
    if(isCur) cls += " cur";
    else if(sel) cls += " sel";
    else if(visited) cls += " done";
    else if(r <= GS.pos.row) cls += " off";
    nodes += `<div class="${cls}" style="left:${px(r,i)}px;top:${py(r)}px;"
      ${sel ? `onclick="pickNode(${r},${i})"` : ""}>${icons[n.type]}</div>`;
  }));

  showOv(`
    <div class="overlay-title">꿈의 지도 🗺️</div>
    <div class="overlay-sub">빛나는 곳 중에서 다음 갈 곳을 고르세요<br>
      <span style="font-size:11px">⚔️ 전투 · ❓ 이벤트 · 🔥 휴식 · 🛒 상점 · 👑 보스</span></div>
    <div class="map-scroll">
      <div class="map-wrap" style="width:${W}px;height:${H}px;">
        <svg width="${W}" height="${H}" style="position:absolute;inset:0;">${lines}</svg>
        ${nodes}
      </div>
    </div>
  `);
}

function pickNode(r, i) {
  if(GS.ovType !== "map" || !nodeSelectable(r, i)) return;
  GS.pos = { row:r, idx:i };
  GS.path.push([r, i]);
  const node = GS.map[r][i];
  if(node.type === "boss"){  // 보스 입장 직전: 유물 선택
    showRelicReward(() => startRoom(node));
    return;
  }
  startRoom(node);
}

function startRoom(node) {
  if(node.type === "combat" || node.type === "boss"){
    closeOv();
    enterCombat(node);
    render();
  } else {
    GS.c.enemies = [];
    GS.c.hand = [];
    render();
    if(node.type === "rest")  showRest();
    if(node.type === "event") showEvent();
    if(node.type === "shop")  showShop();
  }
}

// 방이 끝나면 지도로 복귀
function advanceRoom() {
  showMap();
}

function shuffle(a) {
  for(let i=a.length-1;i>0;i--){
    const j=0|Math.random()*(i+1);
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function log(msg){ GS.logMsg = msg; }

// ── 적 여러 마리 관리 ──
function makeEnemy(key) {
  const e = ENEMIES[key];
  return { key, name:e.name, icon:e.icon, hp:e.hp, maxHp:e.maxHp, block:0, str:0, patIdx:0 };
}

function aliveEnemies(gs) {
  return gs.c.enemies.filter(e => e.hp > 0);
}

// 지금 노리고 있는 적 (죽었으면 살아있는 첫 적으로 자동 변경)
function targetEnemy(gs) {
  let t = gs.c.enemies[gs.c.target];
  if(!t || t.hp <= 0){
    const i = gs.c.enemies.findIndex(e => e.hp > 0);
    if(i < 0) return null;
    gs.c.target = i;
    t = gs.c.enemies[i];
  }
  return t;
}

function damage(gs, amount) {
  const t = targetEnemy(gs);
  if(!t) return;
  let dmg = amount + (gs.player.strength || 0);   // 힘만큼 공격 강화
  const abs = Math.min(t.block, dmg);
  t.block -= abs;
  dmg -= abs;
  t.hp = Math.max(0, t.hp - dmg);
  log(`${t.name}에게 ${dmg} 피해!` + (abs ? ` (${abs} 막힘)` : ""));
}

function damageAll(gs, amount) {
  const total = amount + (gs.player.strength || 0);   // 전체 공격도 힘 적용
  aliveEnemies(gs).forEach(t => {
    let dmg = total;
    const abs = Math.min(t.block, dmg);
    t.block -= abs;
    dmg -= abs;
    t.hp = Math.max(0, t.hp - dmg);
  });
  log(`모든 적에게 ${total} 피해!`);
}

function block(gs, amount) {
  gs.c.playerBlock += amount;
  log(`방어막 +${amount} → 총 ${gs.c.playerBlock}`);
}

function draw(gs, count) {
  for(let i=0;i<count;i++){
    if(gs.deck.draw.length === 0){
      if(gs.deck.discard.length === 0) break;
      gs.deck.draw = shuffle([...gs.deck.discard]);
      gs.deck.discard = [];
      log("버림더미를 섞어 덱으로!");
    }
    if(gs.deck.draw.length) gs.c.hand.push(gs.deck.draw.pop());
  }
}

function maxEnergy() {
  return 3 + (GS.player.relics.includes("alarm") ? 1 : 0) + (GS.player.bonusMaxEnergy || 0);
}

function enterCombat(node) {
  GS.ovType = null;
  const options = node.type === "boss" ? [["alarm_boss"]] : TIER_GROUPS[node.tier];
  const group = options[0 | Math.random() * options.length];
  GS.c.enemies = group.map(makeEnemy);
  GS.c.groupSize = group.length;
  GS.c.target  = 0;
  GS.c.turn    = 0;
  GS.c.hand    = [];
  GS.c.playerBlock = 0;
  GS.c.maxEnergy   = maxEnergy();

  const names = GS.c.enemies.map(e => e.name).join(", ");
  if(GS.player.relics.includes("eyemask")){
    GS.c.playerBlock = 8;
    log(`${names} 등장! (수면안대: 방어막 8)`);
  } else {
    log(`${names}이(가) 나타났다!`);
  }

  GS.deck.draw    = shuffle([...GS.player.deck]);
  GS.deck.discard = [];
  GS.deck.exhaust = [];

  startPlayerTurn();
}

function startPlayerTurn() {
  GS.c.turn++;
  if(GS.c.turn > 1) GS.c.playerBlock = 0;

  const bonus = GS.c.bonusE;
  GS.c.bonusE = 0;
  GS.c.energy = GS.c.maxEnergy + bonus;

  if(GS.player.relics.includes("pillow")){
    GS.player.hp = Math.min(GS.player.hp + 2, GS.player.maxHp);
    log("베개: 체력 2 회복!");
  }

  GS.deck.discard.push(...GS.c.hand);
  GS.c.hand = [];
  const drawN = 5 + (GS.player.relics.includes("diary") ? 1 : 0);
  draw(GS, drawN);

  render();
}

function playCard(idx) {
  const id   = GS.c.hand[idx];
  const card = CARDS[id];
  if(!card) return;
  if(GS.c.energy < card.cost){ log("에너지가 부족해요!"); render(); return; }

  GS.c.energy -= card.cost;
  GS.c.hand.splice(idx, 1);
  card.play(GS);
  (card.exhaust ? GS.deck.exhaust : GS.deck.discard).push(id);

  if(aliveEnemies(GS).length === 0){ onEnemyDead(); return; }
  render();
}

function endTurn() {
  GS.deck.discard.push(...GS.c.hand);
  GS.c.hand = [];
  doEnemyTurn();
  if(GS.player.hp <= 0){ showGameOver(); return; }
  startPlayerTurn();
}

function doEnemyTurn() {
  const msgs = [];
  GS.c.enemies.forEach(en => { if(en.hp > 0) en.block = 0; });

  // 이번 턴에 이미 살아있던 적만 행동 (이번 턴에 소환된 적은 다음 턴부터)
  const acting = aliveEnemies(GS);

  for(const en of acting){
    if(en.hp <= 0) continue;  // 행동 전에 죽었으면 스킵 (미래 확장 대비)
    const base = ENEMIES[en.key];
    const move = base.pattern[en.patIdx % base.pattern.length];
    en.patIdx++;

    if(move.type === "attack"){
      const times = move.times || 1;
      let total = 0, absTotal = 0;
      for(let i = 0; i < times; i++){
        let dmg = move.val + en.str;
        const abs = Math.min(GS.c.playerBlock, dmg);
        GS.c.playerBlock -= abs;
        dmg -= abs;
        GS.player.hp = Math.max(0, GS.player.hp - dmg);
        total += dmg; absTotal += abs;
      }
      msgs.push(`${en.name}: ${total} 피해` + (absTotal ? ` (${absTotal} 막음)` : ""));
      if(GS.player.hp <= 0) break;

    } else if(move.type === "defend"){
      en.block += move.val;
      msgs.push(`${en.name}: 방어 ${move.val}`);

    } else if(move.type === "buff"){
      en.str += move.val;
      msgs.push(`${en.name}: 힘 +${move.val}`);

    } else if(move.type === "heal"){
      en.hp = Math.min(en.maxHp, en.hp + move.val);
      msgs.push(`${en.name}: 체력 ${move.val} 회복`);

    } else if(move.type === "summon"){
      if(aliveEnemies(GS).length < 4){
        GS.c.enemies.push(makeEnemy(move.val));
        msgs.push(`${en.name}이(가) ${ENEMIES[move.val].name}을(를) 불렀다!`);
      } else {
        msgs.push(`${en.name}이(가) 동료를 부르려 했지만 자리가 없다!`);
      }

    } else if(move.type === "split"){
      if(en.hp >= 12 && aliveEnemies(GS).length < 4){
        const clone = makeEnemy(en.key);
        clone.hp = Math.floor(en.hp / 2);
        clone.patIdx = en.patIdx;
        en.hp = Math.ceil(en.hp / 2);
        GS.c.enemies.push(clone);
        msgs.push(`${en.name}이(가) 둘로 분열했다!`);
      } else {
        en.block += 6;
        msgs.push(`${en.name}: 분열 실패, 대신 방어 6`);
      }
    }
  }
  GS.logMsg = msgs.join("  ·  ");
}

function intentText(en) {
  const base = ENEMIES[en.key];
  const move = base.pattern[en.patIdx % base.pattern.length];
  if(move.type === "attack"){
    const t = move.times || 1;
    return `⚔️ ${move.val + en.str}${t > 1 ? "×" + t : ""} 피해`;
  }
  if(move.type === "defend") return `🛡️ 방어 ${move.val}`;
  if(move.type === "buff")   return `💪 힘 +${move.val}`;
  if(move.type === "heal")   return `💚 ${move.val} 회복`;
  if(move.type === "summon") return `📢 동료 부르기`;
  if(move.type === "split")  return `👥 분열!`;
  return "?";
}

let afterReward = null;

function onEnemyDead() {
  const node = GS.map[GS.pos.row][GS.pos.idx];
  if(node.type === "boss"){ showWin(); return; }
  // 골드 보상: 기본 12~18 + 적 마리수 보너스
  const gold = 12 + (0 | Math.random() * 7) + (GS.c.groupSize - 1) * 5;
  GS.player.gold += gold;
  showCardReward(() => advanceRoom(), gold);
}

// 희귀(rare) 카드는 일반 카드보다 3배 덜 나오게 뽑기
function pickRewardCards(pool, n) {
  const items = [...pool];
  const out = [];
  while(out.length < n && items.length){
    const weights = items.map(id => CARDS[id].rare ? 1 : 3);
    let r = Math.random() * weights.reduce((a,b) => a+b, 0);
    let idx = items.length - 1;
    for(let i = 0; i < items.length; i++){ r -= weights[i]; if(r < 0){ idx = i; break; } }
    out.push(items.splice(idx, 1)[0]);
  }
  return out;
}

// 카드 1장의 HTML (손패·보상·상점·제거 화면 공용)
function cardHTML(id, cls, onclick) {
  const c = cardView(id);
  return `<div class="card ${c.type}${cls ? " " + cls : ""}"${onclick ? ` onclick="${onclick}"` : ""}>
    <div class="card-cost">${c.cost}</div>
    <div class="card-header">
      <div class="card-icon">${c.icon}</div>
      <div class="card-type-label">${c.type==="attack"?"공격":c.type==="defense"?"방어":"스킬"}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc.replace(/\n/g,"<br>")}</div>
      ${c.exhaust ? '<div class="card-exhaust">소멸</div>' : ''}
    </div>
  </div>`;
}

function showCardReward(cb, gold) {
  afterReward = cb;
  GS.ovType = "cardReward";
  const ch     = CHARACTERS[GS.player.charId] || CHARACTERS.explorer;
  const pool   = ch.pools[poolIdx()];
  const picked = pickRewardCards(pool, 3);
  const html   = picked.map(id => cardHTML(id, "reward-card", `pickCard('${id}')`)).join('');
  const goldMsg = gold ? `<br>💰 골드 +${gold} (총 ${GS.player.gold})` : "";

  showOv(`
    <div class="overlay-title">전투 승리! 🃏</div>
    <div class="overlay-sub">덱에 추가할 카드를 고르세요${goldMsg}</div>
    <div class="reward-cards">${html}</div>
    <button class="skip-btn" onclick="skipReward()">건너뛰기</button>
  `);
}

function pickCard(id) {
  GS.player.deck.push(id);
  closeOv();
  if(afterReward){ const f=afterReward; afterReward=null; f(); }
}

function skipReward() {
  closeOv();
  if(afterReward){ const f=afterReward; afterReward=null; f(); }
}

function showRelicReward(cb) {
  afterReward = cb;
  GS.ovType = "relic";
  const avail  = Object.keys(RELICS).filter(id => !GS.player.relics.includes(id));
  const picked = shuffle([...avail]).slice(0, 2);
  const html   = picked.map(id => {
    const r = RELICS[id];
    return `<div class="relic-choice" onclick="pickRelic('${id}')">
      <div class="relic-choice-name">${r.name}</div>
      <div class="relic-choice-desc">${r.desc}</div>
    </div>`;
  }).join('');

  showOv(`
    <div class="overlay-title">유물 발견! ✨</div>
    <div class="overlay-sub">보스 전에 강력한 유물을 하나 얻었습니다</div>
    <div class="relic-choices">${html}</div>
  `);
}

function pickRelic(id) {
  GS.player.relics.push(id);
  closeOv();
  if(afterReward){ const f=afterReward; afterReward=null; f(); }
}

  showOv(`
    <div class="overlay-title">모닥불 🔥</div>

function restChoice(kind) {
  if(kind === "sleep"){
    const heal = Math.floor(GS.player.maxHp * 0.4);
    GS.player.hp = Math.min(GS.player.maxHp, GS.player.hp + heal);
    showEventResult("😴", `푹 잤다! 체력 ${heal} 회복 (현재 ${GS.player.hp}/${GS.player.maxHp})`);
  } else {
    GS.player.maxHp += 6;
    GS.player.hp = Math.min(GS.player.maxHp, GS.player.hp + 6);
    showEventResult("💪", `꿈속에서 단련했다! 최대 체력 +6 (현재 ${GS.player.hp}/${GS.player.maxHp})`);
  }
}

          return ["⚡", `제단이 번쩍인다! 매 턴 에너지가 1 더 생긴다 (체력 -8, 최대 에너지 ${maxEnergy()})`];
        } },
      { label:"지나간다 (건너뛰기)", run(){ return ["🚶","제단은 조용히 빛을 거둔다."]; } },
    ],
  },
];

let curEvent = null;
function showEvent() {
  GS.ovType = "event";
  curEvent = EVENTS[0 | Math.random() * EVENTS.length];
  const btns = curEvent.choices.map((c, i) => {
    const ok = !c.cond || c.cond();
    return `<div class="relic-choice" style="${ok ? "" : "opacity:.4;pointer-events:none;"}" onclick="evChoice(${i})">
      <div class="relic-choice-desc" style="font-size:14px;color:#e0d4ff;">${c.label}</div>
    </div>`;
  }).join('');
  showOv(`
    <div class="overlay-title">${curEvent.icon} ${curEvent.title}</div>
    <div class="overlay-sub">${curEvent.text}</div>
    <div class="relic-choices" style="flex-direction:column;align-items:center;">${btns}</div>
  `);
}
function evChoice(i) {
  const c = curEvent.choices[i];
  if(c.remove){ showRemoveCard(() => advanceRoom()); return; }
  const [icon, msg] = c.run();
  showEventResult(icon, msg);
}

// ── 카드 제거 화면 ──
let removeCb = null;
function showRemoveCard(cb) {
  removeCb = cb;
  GS.ovType = "remove";
  const html = GS.player.deck.map((id, i) => cardHTML(id, "mini", `pickRemove(${i})`)).join('');
  showOv(`
    <div class="overlay-title">카드 제거 🪞</div>
    <div class="overlay-sub">덱에서 빼고 싶은 카드를 고르세요</div>
    <div class="deck-grid">${html}</div>
  `);
}
function pickRemove(i) {
  const id = GS.player.deck.splice(i, 1)[0];
  const f = removeCb; removeCb = null;
  showEventResult("🪞", `「${cardView(id).name}」 카드를 제거했다.`, f);
}

// ── 상점 ──
let SHOP = null;
function showShop() {
  GS.ovType = "shop";
  const key = GS.pos.row + "-" + GS.pos.idx;
  if(!SHOP || SHOP.key !== key){
    const ch   = CHARACTERS[GS.player.charId];
    const pool = ch.pools[poolIdx()];
    const avail = Object.keys(RELICS).filter(r => !GS.player.relics.includes(r));
    SHOP = {
      key,
      cards: pickRewardCards(pool, 3).map(id => ({ id, price: CARDS[id].rare ? 45 : 25, sold:false })),
      relic: avail.length ? { id: avail[0 | Math.random() * avail.length], price: 60, sold:false } : null,
      removal: { price: 40, used:false },
    };
  }
  const gold = GS.player.gold;

  const cardsHtml = SHOP.cards.map((it, i) => `
    <div class="shop-item${it.sold ? " sold" : ""}${gold < it.price ? " poor" : ""}">
      ${cardHTML(it.id, "reward-card", `buyCard(${i})`)}
      <div class="price-tag">${it.sold ? "판매 완료" : "💰 " + it.price}</div>
    </div>`).join('');

  const relicHtml = SHOP.relic ? `
    <div class="shop-item${SHOP.relic.sold ? " sold" : ""}${gold < SHOP.relic.price ? " poor" : ""}">
      <div class="relic-choice" onclick="buyRelic()">
        <div class="relic-choice-name">${RELICS[SHOP.relic.id].name}</div>
        <div class="relic-choice-desc">${RELICS[SHOP.relic.id].desc}</div>
      </div>
      <div class="price-tag">${SHOP.relic.sold ? "판매 완료" : "💰 " + SHOP.relic.price}</div>
    </div>` : "";

  const removeHtml = `
    <div class="shop-item${SHOP.removal.used ? " sold" : ""}${gold < SHOP.removal.price ? " poor" : ""}">
      <div class="relic-choice" onclick="buyRemoval()">
        <div class="relic-choice-name">🗑️ 카드 제거</div>
        <div class="relic-choice-desc">덱에서 카드 1장을<br>골라서 없앤다</div>
      </div>
      <div class="price-tag">${SHOP.removal.used ? "이용 완료" : "💰 " + SHOP.removal.price}</div>
    </div>`;

  showOv(`
    <div class="overlay-title">꿈나라 상점 🛒</div>
    <div class="overlay-sub">양 인형 상인이 하품을 하며 말한다. "어서 오세요오오~" &nbsp;|&nbsp; 내 골드: 💰 ${gold}</div>
    <div class="reward-cards">${cardsHtml}</div>
    <div class="relic-choices">${relicHtml}${removeHtml}</div>
    <button class="skip-btn" onclick="shopLeave()">상점 나가기 ▶</button>
  `);
  render();
}
function buyCard(i) {
  const it = SHOP.cards[i];
  if(it.sold || GS.player.gold < it.price) return;
  GS.player.gold -= it.price;
  it.sold = true;
  GS.player.deck.push(it.id);
  showShop();
}
function buyRelic() {
  const it = SHOP.relic;
  if(!it || it.sold || GS.player.gold < it.price) return;
  GS.player.gold -= it.price;
  it.sold = true;
  GS.player.relics.push(it.id);
  showShop();
}
function buyRemoval() {
  if(SHOP.removal.used || GS.player.gold < SHOP.removal.price) return;
  GS.player.gold -= SHOP.removal.price;
  SHOP.removal.used = true;
  showRemoveCard(() => showShop());
}
function shopLeave() {
  SHOP = null;
  advanceRoom();
}

function showGameOver() {
  GS.ovType = "gameover";
  showOv(`
    <div class="overlay-title">😴 꿈에서 깨어났다…</div>
    <div class="overlay-sub">HP가 0이 되어 잠에서 깼습니다.<br>${zoneName(GS.pos.row)}(지도 ${GS.pos.row+1}/${GS.map.length})에서 쓰러졌습니다.</div>
    <button class="action-btn" onclick="newGame(); render();">다시 꾸기 🌙</button>
  `);
}

function showWin() {
  GS.ovType = "win";
  showOv(`
    <div class="overlay-title">🌟 악몽을 이겼다!</div>
    <div class="overlay-sub">알람시계를 부수고 꿈에서 깨어났습니다!<br>당신은 진정한 루시드 드리머입니다.</div>
    <button class="action-btn" onclick="newGame(); render();">다시 꾸기 🌙</button>
  `);
}

function showOv(html) {
  document.getElementById("overlay-box").innerHTML = html;
  document.getElementById("overlay").classList.add("active");
}
function closeOv() {
  if(GS) GS.ovType = null;
  document.getElementById("overlay").classList.remove("active");
}

// ════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════

function render() {
  if(!GS) return;
  const gs = GS;

  // 위치 정보 (지도 진행도)
  document.getElementById("floor-info").textContent = gs.map.length
    ? `🗺️ ${zoneName(gs.pos.row)} · ${Math.max(0, gs.pos.row + 1)}/${gs.map.length}`
    : "";

  // 골드
  document.getElementById("gold-info").textContent = `💰 ${gs.player.gold}`;

  // 캐릭터 아이콘·이름
  if(gs.player.charId){
    const ch = CHARACTERS[gs.player.charId];
    document.getElementById("player-icon").innerHTML = spriteImg(ch.id, 88, ch.icon);
    document.getElementById("player-name").textContent = ch.name;
  }

  // 로그
  document.getElementById("log").textContent = gs.logMsg;

  // 적들 (오른쪽 영역에 살아있는 적만 표시)
  targetEnemy(gs);  // 죽은 적을 노리고 있으면 자동으로 목표 변경
  const area  = document.getElementById("enemy-area");
  area.innerHTML = "";
  const alive = aliveEnemies(gs);
  gs.c.enemies.forEach((en, i) => {
    if(en.hp <= 0) return;
    const div = document.createElement("div");
    div.className = "battle-panel enemy"
      + (alive.length > 2 ? " compact" : "")
      + (i === gs.c.target && alive.length > 1 ? " targeted" : "");
    const hpPct   = Math.max(0, en.hp / en.maxHp * 100);
    const strTag  = en.str > 0 ? `  (힘 +${en.str})` : "";
    const tgtMark = (i === gs.c.target && alive.length > 1) ? "🎯 " : "";
    const spr = spriteImg(en.key, alive.length > 2 ? 58 : 92, en.icon);
    div.innerHTML = `
      <div class="panel-sprite">${spr}</div>
      <div class="panel-name">${tgtMark}${en.name}</div>
      <div class="hp-wrap">
        <div class="hp-row"><span>HP</span><span>${en.hp} / ${en.maxHp}</span></div>
        <div class="hp-bar"><div class="hp-fill enemy-fill" style="width:${hpPct}%"></div></div>
      </div>
      <div class="enemy-block-row">${en.block > 0 ? `🛡️ 방어막 ${en.block}` : ""}</div>
      <div class="intent-box">다음: ${intentText(en)}${strTag}</div>
    `;
    div.onclick = () => { gs.c.target = i; render(); };
    area.appendChild(div);
  });

  // 플레이어
  const pp = Math.max(0, gs.player.hp / gs.player.maxHp * 100);
  document.getElementById("player-hp-fill").style.width = pp + "%";
  document.getElementById("player-hp-text").textContent = `${gs.player.hp} / ${gs.player.maxHp}`;
  document.getElementById("player-str").textContent = gs.player.strength > 0 ? `💪 힘 +${gs.player.strength}` : "";
  document.getElementById("energy-val").textContent = gs.c.energy;
  document.getElementById("block-val").textContent  = gs.c.playerBlock;

  // 더미
  document.getElementById("pile-info").textContent =
    `덱 ${gs.deck.draw.length}장  ·  버림 ${gs.deck.discard.length}장`;

  // 손패
  const handEl = document.getElementById("hand");
  handEl.innerHTML = "";
  gs.c.hand.forEach((id, i) => {
    const c = cardView(id);
    if(!c) return;
    const ok = gs.c.energy >= c.cost;
    const div = document.createElement("div");
    div.className = `card ${c.type}${ok ? "" : " unaffordable"}`;
    div.innerHTML = `
      <div class="card-cost">${c.cost}</div>
      <div class="card-header">
        <div class="card-icon">${c.icon}</div>
        <div class="card-type-label">${c.type==="attack"?"공격":c.type==="defense"?"방어":"스킬"}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.desc.replace(/\n/g,"<br>")}</div>
        ${c.exhaust ? '<div class="card-exhaust">소멸</div>' : ''}
      </div>
    `;
    if(ok) div.onclick = () => playCard(i);
    handEl.appendChild(div);
  });

  // 유물 (왼쪽 상단)
  const relicEl    = document.getElementById("relics");
  const emptyEl    = document.getElementById("relics-empty");
  if(gs.player.relics.length === 0){
    relicEl.innerHTML = "";
    emptyEl.style.display = "inline";
  } else {
    emptyEl.style.display = "none";
    relicEl.innerHTML = gs.player.relics.map(id => {
      const r = RELICS[id];
      return `<div class="relic-badge" data-desc="${r.desc}">${r.name}</div>`;
    }).join('');
  }
}

// ════════════════════════════════════════════
// 배경 캔버스
// ════════════════════════════════════════════

(function initBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, t = 0;

  // ── 별 데이터 ──
  const STARS = [];
  function buildStars() {
    STARS.length = 0;
    for (let i = 0; i < 260; i++) {
      const r = Math.random();
      STARS.push({
        x:  Math.random() * W,
        y:  Math.random() * H,
        sz: r < 0.7 ? Math.random() * 0.9 + 0.3   // 작은 별
           : r < 0.92 ? Math.random() * 1.0 + 1.0  // 중간 별
           : Math.random() * 1.2 + 2.0,             // 큰 별 (드묾)
        base:   Math.random() * 0.5 + 0.4,
        phase:  Math.random() * Math.PI * 2,
        speed:  Math.random() * 0.025 + 0.006,
        cross:  Math.random() < 0.06,               // 십자 반짝임
        warm:   Math.random() < 0.15,               // 노르스름한 별
      });
    }
  }

  // ── 떠다니는 파티클 ──
  const PARTS = [];
  function buildParts() {
    PARTS.length = 0;
    for (let i = 0; i < 30; i++) {
      PARTS.push({
        x:    Math.random() * W,
        y:    Math.random() * H,
        r:    Math.random() * 2.5 + 0.8,
        vy:   -(Math.random() * 0.25 + 0.06),
        vx:   (Math.random() - 0.5) * 0.12,
        a:    Math.random() * 0.3 + 0.05,
        phase: Math.random() * Math.PI * 2,
        hue:  Math.random() < 0.55 ? 230 : 280,   // 파란/보라
      });
    }
  }

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    buildStars();
    buildParts();
  }

  // ── 달 ──
  function drawMoon(mx, my, mr) {
    // 바깥 광채
    const glow = ctx.createRadialGradient(mx, my, mr * 0.4, mx, my, mr * 3.8);
    glow.addColorStop(0,   'rgba(180,190,255,0.18)');
    glow.addColorStop(0.35,'rgba(140,160,255,0.08)');
    glow.addColorStop(1,   'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(mx, my, mr * 3.8, 0, Math.PI * 2); ctx.fill();

    // 달 본체
    const body = ctx.createRadialGradient(mx - mr*0.22, my - mr*0.22, mr*0.05, mx, my, mr);
    body.addColorStop(0,  '#f2eeff');
    body.addColorStop(0.55,'#c4b8f0');
    body.addColorStop(1,  '#8878c0');
    ctx.fillStyle = body;
    ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();

    // 그림자 (초승달 느낌)
    ctx.save();
    ctx.clip();   // 달 영역 안으로 clip
    const shad = ctx.createRadialGradient(mx + mr*0.38, my - mr*0.08, 0, mx + mr*0.38, my - mr*0.08, mr*1.15);
    shad.addColorStop(0,  'rgba(10,8,30,0.75)');
    shad.addColorStop(0.5,'rgba(10,8,30,0.25)');
    shad.addColorStop(1,  'transparent');
    ctx.fillStyle = shad;
    ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // 크레이터
    const craters = [
      { dx:-0.28, dy: 0.12, r:0.09 },
      { dx: 0.08, dy:-0.30, r:0.07 },
      { dx:-0.48, dy:-0.18, r:0.055},
      { dx: 0.25, dy: 0.38, r:0.08 },
      { dx:-0.10, dy: 0.44, r:0.05 },
    ];
    craters.forEach(c => {
      ctx.save();
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = 'rgba(60,50,110,0.7)';
      ctx.beginPath();
      ctx.arc(mx + c.dx*mr, my + c.dy*mr, c.r*mr, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  // ── 성운 ──
  function drawNebula(nx, ny, rx, ry, color, angle=0) {
    const g = ctx.createRadialGradient(nx, ny, 0, nx, ny, Math.max(rx,ry));
    g.addColorStop(0, color);
    g.addColorStop(1, 'transparent');
    ctx.save();
    ctx.translate(nx, ny); ctx.rotate(angle); ctx.scale(1, ry/rx);
    ctx.translate(-nx, -ny);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(nx, ny, rx, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── 메인 드로우 ──
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // 하늘 그라데이션
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0,   '#020210');
    sky.addColorStop(0.45,'#05051e');
    sky.addColorStop(1,   '#0a0622');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // 성운
    drawNebula(W*0.18, H*0.28, 280, 180, 'rgba(75,35,155,0.13)',  0.3);
    drawNebula(W*0.78, H*0.60, 260, 160, 'rgba(35,55,155,0.10)', -0.2);
    drawNebula(W*0.52, H*0.08, 220, 120, 'rgba(90,50,190,0.09)',  0.0);
    drawNebula(W*0.35, H*0.85, 200, 110, 'rgba(50,30,130,0.08)', -0.4);

    // 달 (우측 상단)
    drawMoon(W * 0.83, H * 0.14, Math.min(W, H) * 0.072);

    // 별
    STARS.forEach(s => {
      const tw  = Math.sin(t * s.speed + s.phase) * 0.28 + 0.72;
      const a   = s.base * tw;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle   = s.warm ? '#fff8e0' : (s.sz > 1.8 ? '#ddd4ff' : '#ffffff');
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.sz, 0, Math.PI * 2);
      ctx.fill();
      // 큰 별 십자 빛줄기
      if (s.cross && s.sz > 1.5) {
        const len = s.sz * 4.5;
        ctx.globalAlpha = a * 0.45;
        ctx.strokeStyle = s.warm ? '#ffe8aa' : '#c8c0ff';
        ctx.lineWidth   = 0.6;
        ctx.beginPath();
        ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
        ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
        ctx.stroke();
      }
      ctx.restore();
    });

    // 떠다니는 빛 입자
    PARTS.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -10) { p.y = H + 5; p.x = Math.random() * W; }
      if (p.x < -10 || p.x > W + 10) p.x = Math.random() * W;

      const pulse = Math.sin(t * 0.018 + p.phase) * 0.12 + 0.88;
      const ga = p.a * pulse;
      ctx.save();
      ctx.globalAlpha = ga;
      const g2 = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      g2.addColorStop(0, `hsla(${p.hue},80%,80%,1)`);
      g2.addColorStop(1, 'transparent');
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });

    t++;
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

// ════════════════════════════════════════════
// 시작
// ════════════════════════════════════════════
newGame();
render();
</script>
