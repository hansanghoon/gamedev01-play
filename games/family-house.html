<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Faded Memory (빛바랜 기억)</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  h1 {
    margin-bottom: 4px;
  }
  h1 .subtitle {
    font-size: 0.6em;
    color: #aaa;
    font-weight: normal;
  }
  #gameWrap {
    position: relative;
    display: inline-block;
    margin-top: 10px;
  }
  canvas {
    background: #caa873;
    border: 4px solid white;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }
  #caption {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
  }
  a {
    color: #9cf;
    margin-top: 12px;
  }
  #muteBtn, #menuBtn {
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .hudBtns {
    display: flex;
    gap: 6px;
  }
  #menuOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #menuCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 3px solid #8a6a3a;
    border-radius: 8px;
    padding: 10px 12px;
    width: 60%;
    max-height: 75%;
    overflow-y: auto;
    font-size: 12px;
  }
  #menuTabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tabBtn {
    flex: 1;
    padding: 4px 0;
    background: #e3d3ad;
    border: 1px solid #8a6a3a;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .tabBtn.active {
    background: #8a6a3a;
    color: white;
  }
  .dexRow {
    border-bottom: 1px solid #d8c6a0;
    padding: 5px 0;
    font-size: 11px;
  }
  .dexRow .dexName {
    font-weight: bold;
  }
  .dexRow .dexLoc {
    color: #7a6a50;
    font-size: 11px;
  }
  .dexRow .dexMemory {
    margin-top: 4px;
    line-height: 1.4;
  }
  #settingsPanel label {
    font-size: 12px;
    display: block;
    margin-bottom: 10px;
  }
  #resetBtn, #closeMenuBtn {
    background: #8a6a3a;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  #closeMenuBtn {
    margin-top: 10px;
    width: 100%;
  }
</style>
</head>
<body>
  <h1>Faded Memory <span class="subtitle">빛바랜 기억</span></h1>

  <div id="gameWrap">
    <canvas id="game" width="480" height="320"></canvas>

    <div id="hud">
      <span>가족집 안</span>
      <div class="hudBtns">
        <button id="muteBtn" title="음악 켜기/끄기">🔈</button>
        <button id="menuBtn" title="도감 / 설정">☰</button>
      </div>
    </div>

    <div id="menuOverlay">
      <div id="menuCard">
        <div id="menuTabs">
          <button class="tabBtn active" data-tab="dex">도감</button>
          <button class="tabBtn" data-tab="settings">설정</button>
        </div>
        <div id="dexPanel"></div>
        <div id="settingsPanel" style="display:none;">
          <label>음악 크기: <input type="range" id="volumeSlider" min="0" max="100" value="50"></label>
          <button id="resetBtn">진행 상황 초기화</button>
        </div>
        <button id="closeMenuBtn">닫기</button>
      </div>
    </div>
  </div>

  <div id="caption">방향키로 이동 · 소파/의자/침대 근처에서 스페이스바로 앉기·눕기 · 현관 앞에서 쉬프트키로 마당으로 나가기</div>
  <a href="../index.html">← 게임 목록으로 돌아가기</a>

  <audio id="bgm" src="audio/Home - Toby Fox.mp3" loop preload="auto"></audio>

  <script src="data.js"></script>
  <script src="pixel-art.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const muteBtn = document.getElementById("muteBtn");

    // === 배경음악 (실제 노래 파일을 반복 재생) ===
    const bgm = document.getElementById("bgm");
    bgm.volume = 0.5;
    let musicStarted = false;
    const bgmState = restoreBgmState(bgm);
    if (bgmState) {
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
      if (bgmState.playing) {
        // 자동재생이 막혀있으면 이 play()는 조용히 실패하고, musicStarted는 그대로 false로 남아서
        // 첫 키 입력 때 startMusic()이 다시 시도함
        bgm.play().then(() => { musicStarted = true; }).catch(() => {});
      }
    }
    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgm.play().catch(() => {});
    }
    document.addEventListener("keydown", () => startMusic(), { once: true });
    muteBtn.addEventListener("click", () => {
      startMusic();
      bgm.muted = !bgm.muted;
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
    });
    // 다음 맵으로 넘어가기 직전에 현재 재생 위치를 저장해서, 다음 페이지에서 이어서 재생되게 함
    window.addEventListener("pagehide", () => saveBgmState(bgm));

    // === 메뉴 (도감 / 설정) ===
    const menuBtn = document.getElementById("menuBtn");
    const menuOverlay = document.getElementById("menuOverlay");
    const dexPanel = document.getElementById("dexPanel");
    const settingsPanel = document.getElementById("settingsPanel");
    const volumeSlider = document.getElementById("volumeSlider");
    const resetBtn = document.getElementById("resetBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const tabBtns = document.querySelectorAll(".tabBtn");

    function openMenu() {
      menuOpen = true;
      renderDex(dexPanel);
      menuOverlay.style.display = "flex";
    }

    function closeMenu() {
      menuOpen = false;
      menuOverlay.style.display = "none";
    }

    menuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { menuOpen ? closeMenu() : openMenu(); }
    });
    menuOverlay.addEventListener("click", (e) => {
      if (e.target === menuOverlay) closeMenu();
    });

    tabBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        tabBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        dexPanel.style.display = tab === "dex" ? "block" : "none";
        settingsPanel.style.display = tab === "settings" ? "block" : "none";
      });
    });

    volumeSlider.addEventListener("input", () => {
      bgm.volume = volumeSlider.value / 100;
    });

    resetBtn.addEventListener("click", () => {
      if (confirm("정말 처음부터 다시 시작할까? 모은 추억이 모두 사라져!")) {
        saveCollected([]);
        renderDex(dexPanel);
      }
    });

    // 도트 그리기 도구는 games/pixel-art.js 에서 가져옴 (마당/우물과 같은 스타일을 공유)

    const player = {
      x: 240,
      y: 270,
      speed: 2,
      direction: "down",
      moving: false,
      walkFrame: 0,
      walkTimer: 0
    };

    // 마당 현관문 앞에서 들어온 경우, 현관(출구) 바로 앞에서 시작하게 해줌
    const EXIT = { x: 240, y: 296, radius: 32 };
    let menuOpen = false;
    let nearExit = false;

    // 앉거나 누울 수 있는 가구. radius 안으로 다가가면 스페이스바로 spotX/spotY 자리에 앉음(눕음)
    const FURNITURE = [
      { x: 238, y: 145, radius: 28, type: "sit", spotX: 238, spotY: 118, label: "소파에 앉기" },
      { x: 392, y: 142, radius: 30, type: "lie", spotX: 392, spotY: 104, label: "침대에 눕기" },
      { x: 33, y: 256, radius: 20, type: "sit", spotX: 33, spotY: 225, label: "의자에 앉기" },
      { x: 121, y: 256, radius: 20, type: "sit", spotX: 121, spotY: 225, label: "의자에 앉기" }
    ];
    let nearFurniture = null;
    let resting = null; // null | "sit" | "lie" — 가구에 앉거나 누운 상태
    let restingFurniture = null; // 어떤 가구에 앉아/누워 있는지 (일어날 때 그 가구의 접근 위치로 돌아감)

    // 부딪히면 막히는 가구/벽. 러그·현관 매트처럼 바닥에 깔린 평평한 것은 안 넣음(그냥 지나갈 수 있음)
    const OBSTACLES = [
      { x: 26, y: 22, w: 46, h: 42 }, // 조리대
      { x: 76, y: 22, w: 36, h: 42 }, // 스토브
      { x: 116, y: 22, w: 26, h: 42 }, // 싱크대
      { x: 24, y: 208, w: 18, h: 36 }, // 의자
      { x: 50, y: 220, w: 56, h: 30 }, // 식탁
      { x: 112, y: 208, w: 18, h: 36 }, // 의자
      { x: 34, y: 290, r: 10 }, // 화분
      { x: 186, y: 72, w: 104, h: 58 }, // 소파
      { x: 220, y: 170, w: 40, h: 26 }, // 커피 테이블
      { x: 200, y: 260, r: 9 }, // 화분
      { x: 348, y: 50, w: 88, h: 78 }, // 침대
      { x: 412, y: 70, w: 26, h: 26 }, // 협탁
      { x: 440, y: 245, r: 9 }, // 화분
      { x: 156, y: 0, w: 8, h: 120 }, // 안쪽 벽
      { x: 156, y: 200, w: 8, h: 120 },
      { x: 316, y: 0, w: 8, h: 120 },
      { x: 316, y: 200, w: 8, h: 120 }
    ];

    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === "Shift" && nearExit && !menuOpen) {
        location.href = "family-yard.html";
      }
      if (e.key === " ") {
        e.preventDefault();
        if (resting) {
          standUp(); // 다시 스페이스바를 누르면 일어남
        } else if (nearFurniture) {
          resting = nearFurniture.type;
          restingFurniture = nearFurniture;
          player.x = nearFurniture.spotX;
          player.y = nearFurniture.spotY;
          player.direction = "down";
        }
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    // 일어날 때는 앉은/누운 자리(가구 안쪽)가 아니라, 그 가구에 다가갔던 위치로 돌려보냄.
    // 가구 안쪽 자리에서 한 칸씩 움직이려고 하면 사방이 다 가구 충돌 범위라 못 빠져나오기 때문.
    function standUp() {
      if (restingFurniture) {
        player.x = restingFurniture.x;
        player.y = restingFurniture.y;
      }
      resting = null;
      restingFurniture = null;
    }

    function update() {
      if (menuOpen) return;

      let dx = 0, dy = 0;
      if (keys["ArrowUp"]) { dy = -1; player.direction = "up"; }
      else if (keys["ArrowDown"]) { dy = 1; player.direction = "down"; }
      else if (keys["ArrowLeft"]) { dx = -1; player.direction = "left"; }
      else if (keys["ArrowRight"]) { dx = 1; player.direction = "right"; }

      if (resting) {
        // 앉아/누워 있는 동안 방향키를 누르면 자동으로 일어나서 그 방향으로 움직임
        if (dx !== 0 || dy !== 0) standUp();
        else { player.moving = false; player.walkTimer = 0; player.walkFrame = 0; return; }
      }

      player.moving = dx !== 0 || dy !== 0;

      if (player.moving) {
        moveWithObstacles(player, dx * player.speed, dy * player.speed, OBSTACLES);

        player.walkTimer++;
        if (player.walkTimer >= 8) {
          player.walkTimer = 0;
          player.walkFrame = player.walkFrame === 0 ? 1 : 0;
        }
      } else {
        player.walkTimer = 0;
        player.walkFrame = 0;
      }

      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(40, Math.min(canvas.height - 10, player.y));

      nearExit = Math.hypot(player.x - EXIT.x, player.y - EXIT.y) < EXIT.radius;

      nearFurniture = null;
      for (const f of FURNITURE) {
        if (Math.hypot(player.x - f.x, player.y - f.y) < f.radius) { nearFurniture = f; break; }
      }
    }

    // === 배경 그리기: 거실 · 부엌 · 방, 갈색+초록색 위주로 포근한 느낌 ===
    // 배경은 안 움직이니 한 번만 그려서 캐싱함(games/family-yard.html과 같은 방식)
    function drawHouse(ctx) {
      // 나무 바닥 (갈색 점박이 텍스처)
      ditherGround(ctx, 0, 0, canvas.width, canvas.height, "#caa873", "#b5915e", 16);

      // 거실 러그(바닥에 깔린 것이라 평평하게, 가구보다 먼저 그림)
      ditherGround(ctx, 180, 110, 110, 100, "#4f8f3b", "#3c702c", 20);

      // --- 부엌 (왼쪽): 조리대들은 뒷벽에 붙여서 위로 솟게, 식탁은 다리가 보이게 ---
      drawCounter(ctx, 26, 64, 46);
      drawStove(ctx, 76, 64, 36);
      drawSink(ctx, 116, 64, 26);
      drawChair(ctx, 24, 244, 18);
      drawDiningTable(ctx, 50, 250, 56, 30);
      drawChair(ctx, 112, 244, 18);
      drawPotPlant(ctx, 34, 295, 11);

      // --- 거실 (가운데): 소파는 등받이/팔걸이가 솟아있고, 테이블은 다리가 보임 ---
      drawSofa(ctx, 186, 130, 104);
      drawCoffeeTable(ctx, 220, 196, 40);
      drawPotPlant(ctx, 200, 260, 10);
      pixelBlock(ctx, 222, 280, 40, 16, "#8a6a3a", { outline: false }); // 현관 매트(출구 표시, 평평함)

      // --- 방 (오른쪽): 침대는 머리맏이 솟아있고, 협탁은 낮게 ---
      drawBed(ctx, 348, 128, 88);
      drawNightstand(ctx, 412, 96, 26);
      drawPotPlant(ctx, 440, 250, 10);

      // 방을 나누는 안쪽 벽 (가운데에 문처럼 빈 틈을 둬서 지나다닐 수 있게 함)
      pixelBlock(ctx, 156, 0, 8, 120, "#4a3322");
      pixelBlock(ctx, 156, 200, 8, 120, "#4a3322");
      pixelBlock(ctx, 316, 0, 8, 120, "#4a3322");
      pixelBlock(ctx, 316, 200, 8, 120, "#4a3322");
    }

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = canvas.width;
    bgCanvas.height = canvas.height;
    drawHouse(bgCanvas.getContext("2d"));

    function drawExitHint() {
      if (!nearExit) return;
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("쉬프트키로 마당으로 나가기", EXIT.x, EXIT.y - 24);
    }

    function drawFurnitureHint() {
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "center";
      if (resting === "lie") {
        ctx.fillText("스페이스바로 일어나기", player.x, player.y - 24);
      } else if (resting === "sit") {
        ctx.fillText("스페이스바로 일어나기", player.x, player.y - 60);
      } else if (nearFurniture) {
        ctx.fillText(`스페이스바로 ${nearFurniture.label}`, nearFurniture.x, nearFurniture.y - 20);
      }
    }

    function drawSleepZzz() {
      if (resting !== "lie") return;
      const t = (Date.now() % 1500) / 1500;
      const bob = Math.sin(t * Math.PI * 2) * 3;
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 16px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Zzz", player.x + 22, player.y - 16 + bob);
    }

    function draw() {
      ctx.drawImage(bgCanvas, 0, 0);
      drawExitHint();
      drawFurnitureHint();
      if (resting === "lie") {
        drawLyingCharacter(ctx, player.x, player.y, "#bcd9a8");
      } else {
        drawCharacter(ctx, player.x, player.y, player.direction, player.walkFrame, resting === "sit");
      }
      drawSleepZzz();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
