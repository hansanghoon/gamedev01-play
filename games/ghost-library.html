<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🕯️ 유령의 도서관 (3D 방탈출)</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }

  /* 시작 화면 (클릭하면 게임 시작) */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    color: #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    z-index: 10;
  }
  #overlay h1 {
    color: #c9a84c;
    font-size: 34px;
    margin-bottom: 8px;
  }
  #overlay .hint {
    color: #888;
    font-size: 15px;
    line-height: 1.9;
  }
  #overlay .start {
    margin-top: 24px;
    color: #fff;
    font-size: 18px;
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    50% { opacity: 0.3; }
  }

  /* 화면 중앙 조준점 (3단계에서 물건 조사에 사용 예정) */
  #crosshair {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.6);
    font-size: 20px;
    pointer-events: none;
    display: none;
  }

  /* 조준점 아래 "E — 조사하기" 안내 */
  #prompt {
    position: fixed;
    left: 50%;
    top: 56%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.65);
    color: #e8c66a;
    font-size: 15px;
    padding: 6px 14px;
    border-radius: 14px;
    display: none;
    pointer-events: none;
  }

  /* 하단 메시지 바 (조사 결과 표시) */
  #msg {
    position: fixed;
    left: 50%;
    bottom: 48px;
    transform: translateX(-50%);
    max-width: 70%;
    background: rgba(10, 8, 4, 0.82);
    border: 1px solid #6a5426;
    color: #eee2c8;
    font-size: 17px;
    line-height: 1.6;
    padding: 12px 22px;
    border-radius: 10px;
    text-align: center;
    display: none;
    pointer-events: none;
  }
  #msg small { color: #a99a76; }

  /* 암호 책 읽기 화면 */
  #book-ui {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 15;
  }
  #book-page {
    width: 480px;
    min-height: 380px;
    background: #f0e3c3;
    color: #3a2c15;
    border: 10px solid #5a4020;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
    padding: 26px 34px;
    display: flex;
    flex-direction: column;
    font-size: 18px;
    line-height: 1.9;
  }
  #book-content { flex: 1; }
  #book-content h2 {
    margin: 0 0 14px;
    font-size: 21px;
    border-bottom: 2px dashed #8a6f45;
    padding-bottom: 8px;
  }
  #book-content ul { padding-left: 20px; margin: 8px 0; }
  #book-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    color: #6a5638;
    font-size: 15px;
  }
  #book-nav button {
    background: #5a4020;
    color: #f0e3c3;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  #book-nav button:disabled { opacity: 0.35; cursor: default; }
  #book-close {
    align-self: flex-end;
    background: none;
    border: none;
    color: #6a5638;
    font-size: 20px;
    cursor: pointer;
    margin: -8px -18px 0 0;
  }

  /* 숫자 자물쇠 키패드 */
  #keypad-ui {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 15;
  }
  #keypad-panel {
    background: #23201c;
    border: 3px solid #6a5426;
    border-radius: 14px;
    padding: 22px 28px;
    text-align: center;
    box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
  }
  #kp-title { color: #c9a84c; font-size: 17px; margin-bottom: 14px; }
  #kp-display {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }
  #kp-display span {
    width: 44px;
    height: 56px;
    background: #0d0b08;
    border: 1px solid #6a5426;
    border-radius: 8px;
    color: #ffd97a;
    font-size: 34px;
    line-height: 56px;
  }
  #kp-display.wrong span { border-color: #cc3333; color: #ee6666; }
  #kp-grid {
    display: grid;
    grid-template-columns: repeat(3, 64px);
    gap: 8px;
    justify-content: center;
  }
  #kp-grid button {
    height: 48px;
    font-size: 20px;
    background: #3a332a;
    color: #eee2c8;
    border: 1px solid #6a5426;
    border-radius: 8px;
    cursor: pointer;
  }
  #kp-grid button:hover { background: #4a4136; }
  .shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-7px); }
    80% { transform: translateX(7px); }
  }

  /* 탈출 성공 화면 */
  #win-screen {
    position: fixed;
    inset: 0;
    background: rgba(4, 6, 14, 0.93);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    color: #eee;
    text-align: center;
  }
  #win-screen h1 { color: #ffd97a; font-size: 42px; margin-bottom: 8px; }
  #win-screen p { color: #b8ac8e; font-size: 18px; line-height: 1.9; }
  #win-screen button {
    margin-top: 24px;
    font-size: 17px;
    padding: 11px 28px;
    background: #5a4020;
    color: #f0e3c3;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #error-screen {
    position: fixed;
    inset: 0;
    background: #111;
    color: #e77;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 18px;
    line-height: 2;
    z-index: 20;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>🕯️ 유령의 도서관</h1>
  <div class="hint">
    한밤중, 오래된 도서관에 갇혀버렸다...<br>
    퍼즐을 풀고 비밀 문을 찾아 탈출하자!
    <br><br>
    <b>W A S D</b> — 걷기 &nbsp;|&nbsp; <b>마우스</b> — 둘러보기 &nbsp;|&nbsp; <b>ESC</b> — 일시정지
  </div>
  <div class="start">▶ 화면을 클릭해서 시작</div>
</div>

<div id="crosshair">+</div>
<div id="prompt"></div>
<div id="msg"></div>

<div id="book-ui">
  <div id="book-page">
    <button id="book-close">✕</button>
    <div id="book-content"></div>
    <div id="book-nav">
      <button id="book-prev">◀ 이전</button>
      <span id="book-pageno"></span>
      <button id="book-next">다음 ▶</button>
    </div>
  </div>
</div>

<div id="keypad-ui">
  <div id="keypad-panel">
    <div id="kp-title">🔒 숫자 세 개를 입력하시오</div>
    <div id="kp-display"><span></span><span></span><span></span></div>
    <div id="kp-grid">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="del">⌫</button><button data-k="0">0</button><button data-k="close">✕</button>
    </div>
  </div>
</div>

<div id="win-screen">
  <h1>🌕 탈출 성공!</h1>
  <p>유령의 도서관을 빠져나왔다.<br><span id="win-time"></span></p>
  <button onclick="location.reload()">🔄 다시 도전</button>
</div>

<div id="error-screen">
  ⚠️ 3D 라이브러리(Three.js)를 불러오지 못했어요.<br>
  이 게임은 <b>인터넷 연결이 필요해요.</b><br>
  연결을 확인하고 새로고침(F5) 해주세요.
</div>

<!--
  importmap: "three"라는 짧은 이름이 실제로 어떤 인터넷 주소인지 알려주는 지도.
  아래 script에서 import 'three' 라고 쓰면 이 주소에서 라이브러리를 받아온다.
-->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
// ===== Three.js 불러오기 (인터넷 필요) =====
let THREE, PointerLockControls;
try {
  THREE = await import('three');
  ({ PointerLockControls } = await import('three/addons/controls/PointerLockControls.js'));
} catch (e) {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
  throw e;
}

// ===== 방 크기 (미터 단위라고 생각하면 됨) =====
// 3D 좌표: x = 좌우, y = 위아래, z = 앞뒤
const ROOM_W = 16;       // 방 가로 (x 방향)
const ROOM_D = 12;       // 방 세로 (z 방향)
const ROOM_H = 4.5;      // 천장 높이 (y 방향)
const EYE_HEIGHT = 1.6;  // 플레이어 눈높이

// ===== 장면(Scene) = 3D 물체를 담는 무대 =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12); // 거의 검은 남색 밤 분위기

// ===== 카메라 = 플레이어의 눈 =====
const camera = new THREE.PerspectiveCamera(
  70,                                    // 시야각 (도 단위)
  window.innerWidth / window.innerHeight, // 화면 비율
  0.1,                                   // 이보다 가까우면 안 보임
  100                                    // 이보다 멀면 안 보임
);
camera.position.set(0, EYE_HEIGHT, 3); // 방 가운데쯤에서 시작

// ===== 렌더러 = 장면을 화면에 그려주는 화가 =====
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true; // 진짜 그림자 켜기! (그림자방 퍼즐에 사용)
renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 부드러운 그림자
document.body.appendChild(renderer.domElement);

// ===== 방 만들기 (바닥 + 벽 4면 + 천장) =====
// Mesh = 모양(Geometry) + 재질(Material)을 합친 3D 물체
const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a3320 }); // 어두운 나무 바닥
const wallMat  = new THREE.MeshStandardMaterial({ color: 0x3a3040 }); // 보라빛 도는 어두운 벽
const ceilMat  = new THREE.MeshStandardMaterial({ color: 0x241f2b }); // 더 어두운 천장

// 바닥 — PlaneGeometry는 평평한 판. 기본은 세로로 서 있어서 눕혀줘야 함
const floor = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), floorMat);
floor.rotation.x = -Math.PI / 2; // -90도 돌려서 바닥으로 눕히기
scene.add(floor);

// 천장
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W, ROOM_D), ceilMat);
ceiling.rotation.x = Math.PI / 2; // 반대로 돌려서 아래를 보게
ceiling.position.y = ROOM_H;
scene.add(ceiling);

// 벽 4면 — 위치와 방향만 다르고 만드는 법은 같다
function makeWall(width, x, z, rotY) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(width, ROOM_H), wallMat);
  wall.position.set(x, ROOM_H / 2, z);
  wall.rotation.y = rotY;
  scene.add(wall);
  return wall;
}
makeWall(ROOM_W, 0, -ROOM_D / 2, 0);            // 북쪽 벽 (안쪽을 보게)
makeWall(ROOM_D, -ROOM_W / 2, 0,  Math.PI / 2); // 서쪽 벽
makeWall(ROOM_D,  ROOM_W / 2, 0, -Math.PI / 2); // 동쪽 벽

// 남쪽 벽은 가운데에 문구멍(폭 2m, 높이 3.3m)을 남기고 세 조각으로 만든다
function southWallPiece(w, h, x, y) {
  const p = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  p.position.set(x, y, ROOM_D / 2);
  p.rotation.y = Math.PI;
  scene.add(p);
}
southWallPiece(7, ROOM_H, -4.5, ROOM_H / 2);                       // 문 왼쪽
southWallPiece(7, ROOM_H,  4.5, ROOM_H / 2);                       // 문 오른쪽
southWallPiece(2, ROOM_H - 3.3, 0, 3.3 + (ROOM_H - 3.3) / 2);     // 문 위쪽

// ===== 씨앗 있는 랜덤 =====
// Math.random()은 새로고침할 때마다 결과가 달라지지만,
// 씨앗(seed)에서 시작하는 이 랜덤은 언제나 같은 순서로 숫자가 나온다.
// → 책 배치가 새로고침해도 항상 똑같다!
let seed = 20140401; // 씨앗 값
function rand() {
  seed = (seed * 1664525 + 1013904223) >>> 0;
  return seed / 4294967296; // 0 ~ 1 사이 숫자
}

// ===== 자주 쓰는 재질은 한 번만 만들어서 재사용 =====
const woodDarkMat = new THREE.MeshStandardMaterial({ color: 0x2b1d10 }); // 아주 어두운 나무
const woodMat     = new THREE.MeshStandardMaterial({ color: 0x54381e }); // 나무
const brassMat    = new THREE.MeshStandardMaterial({ color: 0xb08d3c, metalness: 0.6, roughness: 0.4 }); // 놋쇠
const candleMat   = new THREE.MeshStandardMaterial({ color: 0xe8dcc0 }); // 양초 몸통
// 책 색깔 팔레트 (낡은 책 느낌의 톤)
const bookMats = [0x6b3a3a, 0x3a4a6b, 0x3f5c3a, 0x6b5a2e, 0x4a3a5c, 0x5c4632, 0x704848, 0x37524f]
  .map((c) => new THREE.MeshStandardMaterial({ color: c }));

// 상자를 만들어 장면에 넣는 도우미 — 가구는 전부 이걸로 조립한다
function box(w, h, d, mat, x, y, z, parent = scene) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  parent.add(m);
  return m;
}

// ===== 가구 충돌 목록 =====
// 가구마다 "위에서 내려다본 사각형 영역"을 기록해두고,
// 플레이어가 그 안으로 들어오면 밀어낸다 (movePlayer에서 처리)
const colliders = [];

// ===== 책 장부 =====
// 모든 책을 좌표로 기록해둔다: books[책장번호][칸번호(아래부터 1~4)] = [왼쪽부터 책들]
// 씨앗 랜덤 덕분에 새로고침해도 배치가 똑같아서, 좌표가 항상 같은 책을 가리킨다
const books = {};

// 책장 번호판: 캔버스에 숫자를 그려서 texture(그림 재질)로 만든다
function plaqueMat(num) {
  const cv = document.createElement('canvas');
  cv.width = 128; cv.height = 64;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#8a6a2a';
  ctx.fillRect(0, 0, 128, 64);
  ctx.strokeStyle = '#4a3512';
  ctx.lineWidth = 6;
  ctx.strokeRect(4, 4, 120, 56);
  ctx.fillStyle = '#241a08';
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(num), 64, 34);
  return new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(cv) });
}

// ===== 책장 =====
const SHELF_W = 3, SHELF_H = 3.2, SHELF_D = 0.5;
function makeBookshelf(shelfNo, x, z, rotY) {
  const g = new THREE.Group();
  const T = 0.06; // 판자 두께
  books[shelfNo] = { 1: [], 2: [], 3: [], 4: [] };

  box(SHELF_W, SHELF_H, T, woodDarkMat, 0, SHELF_H / 2, -SHELF_D / 2 + T / 2, g); // 뒷판
  box(T, SHELF_H, SHELF_D, woodDarkMat, -SHELF_W / 2 + T / 2, SHELF_H / 2, 0, g); // 왼쪽 옆판
  box(T, SHELF_H, SHELF_D, woodDarkMat,  SHELF_W / 2 - T / 2, SHELF_H / 2, 0, g); // 오른쪽 옆판

  const levels = [0.05, 0.85, 1.65, 2.45, 3.15]; // 선반 높이들 (맨 위는 뚜껑)
  for (const y of levels) box(SHELF_W - T * 2, T, SHELF_D, woodDarkMat, 0, y, 0, g);

  // 책장 위에 번호판 (퍼즐에서 "n번 책장"을 찾을 때 사용)
  box(0.55, 0.28, 0.04, plaqueMat(shelfNo), 0, SHELF_H + 0.2, SHELF_D / 2 - 0.1, g);

  // 선반마다 책 꽂기 (두께·높이·색을 랜덤하게 → 자연스러운 책장)
  for (let i = 0; i < 4; i++) {
    const shelfY = levels[i] + T / 2;
    let bx = -SHELF_W / 2 + T + 0.04;
    while (bx < SHELF_W / 2 - T - 0.2) {
      const bw = 0.1 + rand() * 0.1;   // 책 두께
      const bh = 0.35 + rand() * 0.28; // 책 높이
      const b = box(bw, bh, 0.3, bookMats[Math.floor(rand() * bookMats.length)],
                    bx + bw / 2, shelfY + bh / 2, 0, g);
      const level = i + 1;
      b.userData = { type: 'book', shelf: shelfNo, level, index: books[shelfNo][level].length + 1 };
      books[shelfNo][level].push(b);
      bx += bw + 0.02;
      if (rand() < 0.12) bx += 0.18; // 가끔 빈틈 (누가 책을 빼갔나?)
    }
  }

  g.position.set(x, 0, z);
  g.rotation.y = rotY;
  scene.add(g);

  // 충돌 영역: 90도 돌린 책장은 가로·세로가 뒤바뀐다
  const rotated = Math.abs(Math.sin(rotY)) > 0.5;
  const halfW = rotated ? SHELF_D / 2 : SHELF_W / 2;
  const halfD = rotated ? SHELF_W / 2 : SHELF_D / 2;
  colliders.push({ minX: x - halfW, maxX: x + halfW, minZ: z - halfD, maxZ: z + halfD });
}

// 북쪽 벽에 1~4번, 서쪽 벽에 5~6번, 동쪽 벽에 7~8번
makeBookshelf(1, -6, -5.75, 0);
makeBookshelf(2, -2, -5.75, 0);
makeBookshelf(3,  2, -5.75, 0);
makeBookshelf(4,  6, -5.75, 0);
makeBookshelf(5, -7.75, -2.5,  Math.PI / 2);
makeBookshelf(6, -7.75,  2.5,  Math.PI / 2);
makeBookshelf(7,  7.75, -2.5, -Math.PI / 2);
makeBookshelf(8,  7.75,  2.5, -Math.PI / 2);

// ===== 책상 + 의자 (방 가운데) =====
box(2.2, 0.08, 1.1, woodMat, 0, 0.76, 0); // 상판
for (const sx of [-1, 1]) for (const sz of [-1, 1])
  box(0.1, 0.76, 0.1, woodDarkMat, sx * 1.0, 0.38, sz * 0.45); // 다리 4개
colliders.push({ minX: -1.1, maxX: 1.1, minZ: -0.55, maxZ: 0.55 });

// E키로 조각상을 45도씩 돌려서, 벽의 그림과 그림자를 똑같이 만들면 성공!
const statueMat = new THREE.MeshStandardMaterial({ color: 0x7a7268 }); // 돌 재질
function statuePart(w, h, d, x, y, z, parent) {
  const m = box(w, h, d, statueMat, x, y, z, parent);
  m.castShadow = true; // 이 조각이 그림자를 만든다
  return m;
}

const statues = [];
function makeStatue(name, buildFn, z, targetStep, startStep) {
  const x = -2.5; // 서쪽 벽에서 2.5m
  const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.52, 1.0, 10), woodDarkMat);
  pedestal.position.set(x, 0.5, z);
  pedestal.castShadow = true;
  scene.add(pedestal);
  colliders.push({ minX: x - 0.55, maxX: x + 0.55, minZ: z - 0.55, maxZ: z + 0.55 });

  const g = new THREE.Group();
  buildFn(g);
  // 보이지 않는 조준용 상자: 조각 부품 사이 빈틈을 조준해도 E가 먹히게
  // (material.visible=false → 눈에는 안 보여도 레이저(Raycaster)에는 잡힌다)
  const hitbox = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.1, 1.0),
    new THREE.MeshBasicMaterial({ visible: false }));
  hitbox.position.y = 0.35;
  g.add(hitbox);
  g.position.set(x, 1.0, z);
  g.rotation.y = startStep * Math.PI / 4;
  g.userData = { type: 'statue', name, step: startStep, targetStep, rotTarget: g.rotation.y };
  scene.add(g);
  statues.push(g);
  // 조각 부품들도 조사 대상으로 (부품을 바라봐도 조각상 전체를 돌리게)
  g.children.forEach((c) => { c.userData = { type: 'statue', group: g }; });

  // 그림자를 만드는 빛: 조각상 동쪽에서 서쪽 벽을 향해
  const sl = new THREE.SpotLight(0xffc070, 40, 12, 0.55, 0.4);
  sl.position.set(x + 3.2, 1.6, z);
  sl.target.position.set(R2_MINX, 1.6, z);
  sl.castShadow = true;
  sl.shadow.mapSize.set(512, 512);
  scene.add(sl);
  scene.add(sl.target);
}

// ===== 서쪽 벽의 그림 3점 (그림자를 맞춰야 할 목표 모양) =====
// 그림자가 지는 자리(아래)를 가리지 않게 그림은 벽 위쪽에 건다.
// squish: 대각선 그림자는 홀쭉해 보인다 (가로로 눌러 그리기)
// mirror: 반대쪽 대각선이면 좌우가 뒤집혀 보인다
function drawSilhouette(draw, squish = 1, mirror = false) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = '#cdbd97'; // 낡은 종이색
  ctx.fillRect(0, 0, 256, 256);
  ctx.strokeStyle = '#4a3512';
  ctx.lineWidth = 14;
  ctx.strokeRect(7, 7, 242, 242);
  ctx.fillStyle = '#20202c'; // 그림자색
  ctx.save();
  ctx.translate(128, 0);
  ctx.scale((mirror ? -1 : 1) * squish, 1); // 가운데 기준으로 눌러찌그리기/뒤집기
  ctx.translate(-128, 0);
  draw(ctx);
  ctx.restore();
  // MeshBasicMaterial: 촛불빛에 바래지 않고 언제나 또렷하게 보인다
  return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv) });
}
function hangPainting(mat, z) {
  const p = new THREE.Mesh(new THREE.PlaneGeometry(1.4, 1.4), mat);
  p.position.set(R2_MINX + 0.02, 2.85, z); // 위쪽에! (아래는 그림자 자리)
  p.rotation.y = Math.PI / 2;
  p.userData = { type: 'painting' };
  scene.add(p);
  return p;
}
// 고양이: 대각선(135°) → 홀쭉한 실루엣 (머리 오른쪽)
const catPainting = hangPainting(drawSilhouette((c) => {
  c.fillRect(60, 130, 120, 55);   // 몸통
  c.fillRect(160, 85, 50, 50);    // 머리
  c.fillRect(165, 60, 14, 28);    // 귀
  c.fillRect(192, 60, 14, 28);    // 귀
  c.fillRect(48, 65, 16, 70);     // 꼬리
}, 0.72), 8.5);
// 새: 반대 대각선(225°) → 홀쭉 + 좌우 반전 (부리가 왼쪽!)
const birdPainting = hangPainting(drawSilhouette((c) => {
  c.fillRect(120, 160, 18, 45);   // 다리

// 주전자: 정면(90°) → 그대로 (주둥이 오른쪽)

}), 14);

// ===== 촛불 =====
// 촛불 하나 = 받침대(놋쇠) + 양초 + 불꽃 + 진짜 빛(PointLight)
// 불꽃은 emissive(스스로 빛나는 색)라서 조명이 없어도 밝게 보인다
const candles = []; // 깜빡임 애니메이션을 위해 모아두기
function makeCandle(x, z, standH, power, y = 0) {
  const g = new THREE.Group();
  if (standH > 0) { // 바닥에 세우는 긴 촛대
    const stand = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.09, standH), brassMat);
    stand.position.y = standH / 2;
    g.add(stand);
  }
  const dish = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.09, 0.04), brassMat);
  dish.position.y = standH + 0.02;
  g.add(dish);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.05, 0.26), candleMat);
  body.position.y = standH + 0.17;
  g.add(body);
  const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.035, 0.12, 8),
    new THREE.MeshStandardMaterial({ color: 0xffaa33, emissive: 0xff8811, emissiveIntensity: 3 })
  );
  flame.position.y = standH + 0.37;
  g.add(flame);

  const light = new THREE.PointLight(0xffb055, power, 11);
  light.position.y = standH + 0.45;
  g.add(light);

  g.position.set(x, y, z);
  scene.add(g);
  candles.push({ light, flame, base: power });
}

const overlay = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');

overlay.addEventListener('click', () => controls.lock());
// 잠금이 어쩌다 풀린 채 남으면(브라우저가 재잠금을 잠시 거부할 때) 화면 클릭으로 복구
renderer.domElement.addEventListener('click', () => {
  if (!controls.isLocked && !uiMode) controls.lock();
});
let startTime = null; // 처음 게임을 시작한 시각 (탈출 시간 계산용)
controls.addEventListener('lock', () => {   // 게임 시작
  startTime ??= performance.now();
  overlay.style.display = 'none';
  crosshair.style.display = 'block';
});
controls.addEventListener('unlock', () => {
  if (uiMode) return; // 책·자물쇠·성공 화면이 떠 있으면 일시정지 화면을 띄우지 않는다
  overlay.style.display = 'flex';  // ESC → 일시정지
  crosshair.style.display = 'none';
});

// ===== WASD 이동 =====
const keys = {}; // 지금 눌려 있는 키들
document.addEventListener('keydown', (e) => { keys[e.code] = true; });
document.addEventListener('keyup',   (e) => { keys[e.code] = false; });

// ===== 조사(상호작용) 시스템 =====
// Raycaster = 카메라에서 레이저를 쏴서 "지금 뭘 바라보고 있는지" 알아내는 도구
const raycaster = new THREE.Raycaster();
raycaster.far = 3.2; // 3.2m 안의 물체만 조사 가능

// 조사할 수 있는 물체 목록: 모든 책 + 암호 책 + 문들 + 조각상 + 그림
const examinables = [codeBook, door, knob, exitDoor, exitKnob,
                     catPainting, birdPainting, potPainting];
for (const shelfNo in books)
  for (const level in books[shelfNo])
    examinables.push(...books[shelfNo][level]);
for (const s of statues) examinables.push(...s.children);

const promptEl = document.getElementById('prompt');
const msgEl = document.getElementById('msg');
const PROMPT_TEXT = {
  book: 'E — 책 조사하기',
  codebook: 'E — 책 읽기',
  door: 'E — 문 조사하기',
  exitdoor: 'E — 문 조사하기',
  statue: 'E — 조각상 돌리기',
  painting: 'E — 그림 보기',
};

let target = null; // 지금 조준점이 가리키는 물체
function updateTarget() {
  raycaster.setFromCamera({ x: 0, y: 0 }, camera); // (0,0) = 화면 정중앙
  const hit = controls.isLocked ? raycaster.intersectObjects(examinables, false)[0] : null;
  const found = hit ? hit.object : null;
  if (found === target) return;

  // 이전 대상의 하이라이트를 끄고, 새 대상을 살짝 빛나게
  // (책들은 재질을 공유하므로, 복제본을 만들어 그 책만 밝힌다)
  if (target) target.material = target.userData.origMat;
  target = found;
  if (target) {
    target.userData.origMat = target.material;
    const hl = target.material.clone();
    hl.emissive = new THREE.Color(0x4a3512);
    target.material = hl;
    promptEl.textContent = PROMPT_TEXT[target.userData.type];
    promptEl.style.display = 'block';
  } else {
    promptEl.style.display = 'none';
  }
}

// 하단 메시지 (몇 초 뒤 저절로 사라짐)
let msgTimer;
function showMsg(html) {
  msgEl.innerHTML = html;
  msgEl.style.display = 'block';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { msgEl.style.display = 'none'; }, 4500);
}

function examine(obj) {
  const d = obj.userData;
  if (d.type === 'book') {
    const where = `${d.shelf}번 책장 · 아래에서 ${d.level}번째 칸 · 왼쪽에서 ${d.index}번째 책`;
    showMsg(d.title
      ? `📖 <b>『${d.title}』</b><br><small>${where}</small>`
      : `📖 제목이 바래서 읽을 수가 없다…<br><small>${where}</small>`);
  } else if (d.type === 'codebook') {
    openBook();
  } else if (d.type === 'door') {
    if (doorOpen) showMsg('🚪 문이 열려 있다! 다음 방으로 가자!');
    else openKeypad();
  } else if (d.type === 'exitdoor') {
    if (exitOpen) showMsg('🚪 문이 열려 있다! 밖으로 나가자!');
    else showMsg('🚪 꿈쩍도 하지 않는다. 벽의 <b>그림들</b>과 조각상의 <b>그림자</b>… 뭔가 관계가 있을 것 같다.');
  } else if (d.type === 'painting') {
    showMsg('🖼️ 낡은 그림이다. 조각상의 <b>그림자</b>를 이 그림과 똑같은 모양으로 만들라는 뜻인가?');
  } else if (d.type === 'statue') {
    rotateStatue(d.group);
  }
}

// 조각상 돌리기: 45도씩. 셋 다 그림과 같은 방향이 되면 출구가 열린다!
function rotateStatue(g) {
  const u = g.userData;
  u.step = (u.step + 1) % 8;
  u.rotTarget += Math.PI / 4; // animate()에서 부드럽게 돌아간다
  if (exitOpen) return;
  if (statues.every((s) => s.userData.step === s.userData.targetStep)) {
    exitOpen = true;
    setTimeout(() => showMsg('🔮 그림자가 전부 그림과 겹쳤다! <b>쿠구궁…</b> 남쪽 문이 열린다!'), 400);
  }
}

// ===== 암호 책 읽기 화면 =====
const bookUI = document.getElementById('book-ui');
const bookContent = document.getElementById('book-content');
const bookPageNo = document.getElementById('book-pageno');
let uiMode = null; // 지금 떠 있는 화면: null | 'book' | 'keypad' | 'win'
let pageIdx = 0;

// 페이지 내용 만들기: 규칙 1장 + 숫자 힌트 3장
const bookPages = [
  `<h2>🕯️ 이 책을 발견한 자에게</h2>
   문을 열려면 <b>숫자 세 개</b>가 필요하다.<br>
   다음 장부터 적힌 책들을 찾아라.<br><br>
   <small>· 책장 번호는 책장 <b>위 놋쇠 번호판</b>에 있다<br>
   · 칸은 <b>아래에서부터</b> 1, 2, 3, 4<br>
   · 책은 <b>왼쪽에서부터</b> 센다<br><br>
   가짜 책들 사이에서, <b>숫자처럼 들리는 제목</b>만이 진짜다…</small>`,
  ...PUZZLE_PAGES.map((p) => `
   <h2>${p.label}</h2>
   <ul>${p.clues.map((c) =>
     `<li><b>${c.shelf}번 책장</b> · 아래에서 <b>${c.level}번째 칸</b> · 왼쪽에서 <b>${c.index}번째 책</b></li>`
   ).join('')}</ul>
   <small>이 중 진짜는 단 하나.</small>`),
];

function renderPage() {
  bookContent.innerHTML = bookPages[pageIdx];
  bookPageNo.textContent = `${pageIdx + 1} / ${bookPages.length}`;
  document.getElementById('book-prev').disabled = pageIdx === 0;
  document.getElementById('book-next').disabled = pageIdx === bookPages.length - 1;
}
function openBook() {
  uiMode = 'book';
  pageIdx = 0;
  renderPage();
  bookUI.style.display = 'flex';
  controls.unlock(); // 마우스를 풀어서 버튼을 누를 수 있게
}
function closeBook() {
  uiMode = null;
  bookUI.style.display = 'none';
  controls.lock(); // 다시 1인칭 조작으로
}
document.getElementById('book-prev').addEventListener('click', () => { pageIdx--; renderPage(); });
document.getElementById('book-next').addEventListener('click', () => { pageIdx++; renderPage(); });
document.getElementById('book-close').addEventListener('click', closeBook);

// ===== 숫자 자물쇠 (키패드) =====
const keypadUI = document.getElementById('keypad-ui');
const kpDisplay = document.getElementById('kp-display');
const kpPanel = document.getElementById('keypad-panel');
const kpSlots = kpDisplay.querySelectorAll('span');
let kpEntry = '';      // 지금까지 누른 숫자들
let kpChecking = false; // 정답 확인 중엔 입력 잠금

function renderKp() {
  kpSlots.forEach((s, i) => { s.textContent = kpEntry[i] ?? ''; });
}
function openKeypad() {
  uiMode = 'keypad';
  kpEntry = '';
  kpChecking = false;
  renderKp();
  keypadUI.style.display = 'flex';
  controls.unlock();
}
function closeKeypad() {
  uiMode = null;
  keypadUI.style.display = 'none';
  controls.lock();
}
function kpInput(k) {
  if (kpChecking) return;
  if (k === 'close') { closeKeypad(); return; }
  if (k === 'del') { kpEntry = kpEntry.slice(0, -1); renderKp(); return; }
  if (kpEntry.length >= 3) return;
  kpEntry += k;
  renderKp();
  if (kpEntry.length === 3) { // 세 자리가 다 차면 잠깐 뒤에 자동 확인
    kpChecking = true;
    setTimeout(kpCheck, 400);
  }
}
function kpCheck() {
  if (kpEntry === DOOR_CODE) {
    closeKeypad();
    doorOpen = true; // animate()에서 문이 스르륵 열린다
    showMsg('🔓 철컥! …문이 천천히 열린다!');
  } else {
    // 오답: 빨갛게 + 흔들림, 그리고 다시 입력
    kpDisplay.classList.add('wrong');
    kpPanel.classList.add('shake');
    setTimeout(() => {
      kpDisplay.classList.remove('wrong');
      kpPanel.classList.remove('shake');
      kpEntry = '';
      kpChecking = false;
      renderKp();
    }, 650);
  }
}
document.getElementById('kp-grid').addEventListener('click', (e) => {
  if (e.target.dataset.k) kpInput(e.target.dataset.k);
});

// ===== 탈출 성공 =====
let escaped = false;
function triggerWin() {
  escaped = true;
  uiMode = 'win';
  const sec = Math.round((performance.now() - startTime) / 1000);
  document.getElementById('win-time').textContent =
    `걸린 시간: ${Math.floor(sec / 60)}분 ${sec % 60}초`;
  document.getElementById('win-screen').style.display = 'flex';
  crosshair.style.display = 'none';
  controls.unlock();
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyE' && controls.isLocked && target) examine(target);
  if (e.code === 'Escape') {
    if (uiMode === 'book') closeBook();
    else if (uiMode === 'keypad') closeKeypad();
  }
  // 키패드가 떠 있을 땐 키보드 숫자로도 입력 가능
  if (uiMode === 'keypad') {
    if (/^[0-9]$/.test(e.key)) kpInput(e.key);
    if (e.key === 'Backspace') kpInput('del');
  }
});

const MOVE_SPEED = 3.5; // 초당 이동 거리
const WALL_MARGIN = 0.5; // 벽에 딱 붙지 않게 여유 두기

function movePlayer(dt) {
  if (!controls.isLocked) return; // 일시정지 중엔 안 움직임

  // 앞뒤(z), 좌우(x) 입력을 -1 ~ 1 로 정리
  let forward = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
  let right   = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);

  // 대각선으로 갈 때 더 빨라지지 않게 보정
  if (forward !== 0 && right !== 0) {
    forward *= Math.SQRT1_2;
    right   *= Math.SQRT1_2;
  }

  controls.moveForward(forward * MOVE_SPEED * dt);
  controls.moveRight(right * MOVE_SPEED * dt);

  // 벽 밖으로 못 나가게 — 지금 있는 곳(도서관/문 사이/그림자방)에 따라 범위가 다르다
  const pos = camera.position;
  pos.y = EYE_HEIGHT; // 눈높이 고정 (점프 없음)

  if (pos.z <= 5.5) {
    // 도서관 (1번 방)
    pos.x = Math.max(-7.5, Math.min(7.5, pos.x));
    pos.z = Math.max(-5.5, pos.z);
  } else if (pos.z < 6.6) {
    // 도서관 문 통로: 문이 열려 있어야 하고, 문구멍 가운데로만
    if (!doorOpen) pos.z = 5.5;
    else pos.x = Math.max(-0.7, Math.min(0.7, pos.x));
  } else {
    // 그림자방 (2번 방)
    pos.x = Math.max(R2_MINX + 0.5, Math.min(R2_MAXX - 0.5, pos.x));
    if (pos.z > 15.5) {
      if (!exitOpen) pos.z = 15.5;                      // 출구가 닫혀 있으면 벽
      else pos.x = Math.max(-0.7, Math.min(0.7, pos.x)); // 열렸으면 문구멍으로만
    }
    // 출구를 지나 밖으로 나가면 탈출 성공!
    if (exitOpen && !escaped && pos.z > 16.4) triggerWin();
  }

  // 가구 충돌: 가구 영역(+ 몸 반지름)에 들어가면
  // 가장 얕게 파고든 방향으로 밀어낸다
  const R = 0.35; // 플레이어 몸 반지름
  for (const c of colliders) {
    if (pos.x > c.minX - R && pos.x < c.maxX + R &&
        pos.z > c.minZ - R && pos.z < c.maxZ + R) {
      const fromWest  = pos.x - (c.minX - R); // 서쪽 면에서 얼마나 들어왔나
      const fromEast  = (c.maxX + R) - pos.x;
      const fromNorth = pos.z - (c.minZ - R);
      const fromSouth = (c.maxZ + R) - pos.z;
      const shallowest = Math.min(fromWest, fromEast, fromNorth, fromSouth);
      if      (shallowest === fromWest)  pos.x = c.minX - R;
      else if (shallowest === fromEast)  pos.x = c.maxX + R;
      else if (shallowest === fromNorth) pos.z = c.minZ - R;
      else                               pos.z = c.maxZ + R;
    }
  }
}

// ===== 게임 루프 (매 프레임 실행) =====
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1); // 프레임 사이 시간 (탭 전환 시 튀는 것 방지)
  movePlayer(dt);
  updateTarget(); // 조준점이 가리키는 물체 갱신

  // 촛불 깜빡임: 밝기와 불꽃 크기를 매 프레임 살짝 흔든다
  for (const c of candles) {
    c.light.intensity = c.base * (0.85 + Math.random() * 0.3);
    c.flame.scale.setScalar(0.9 + Math.random() * 0.2);
  }

  // 문 열림: 경첩을 축으로 바깥쪽으로 스르륵 (약 109도까지)
  if (doorOpen && doorGroup.rotation.y > -1.9) {
    doorGroup.rotation.y = Math.max(-1.9, doorGroup.rotation.y - dt * 1.4);
  }
  if (exitOpen && exitDoorGroup.rotation.y > -1.9) {
    exitDoorGroup.rotation.y = Math.max(-1.9, exitDoorGroup.rotation.y - dt * 1.4);
  }

  // 조각상: 목표 각도까지 부드럽게 돌아간다
  for (const s of statues) {
    s.rotation.y += (s.userData.rotTarget - s.rotation.y) * Math.min(1, dt * 8);
  }

  renderer.render(scene, camera);
}
animate();

// 개발·테스트용: 브라우저 콘솔(F12)에서 game.camera.position 등을 확인할 수 있다
window.game = {
  camera, controls, colliders, candles, books, examinables, PUZZLE_PAGES, statues,
  get doorOpen() { return doorOpen; },
  get exitOpen() { return exitOpen; },
};

// 창 크기가 바뀌면 화면도 맞춰주기
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
