<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Faded Memory (빛바랜 기억)</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  h1 {
    margin-bottom: 4px;
  }
  h1 .subtitle {
    font-size: 0.6em;
    color: #aaa;
    font-weight: normal;
  }
  #gameWrap {
    position: relative;
    display: inline-block;
    margin-top: 10px;
  }
  canvas {
    background: #8fc36b;
    border: 4px solid white;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }
  #caption {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
  }
  a {
    color: #9cf;
    margin-top: 12px;
  }
  #muteBtn, #menuBtn {
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .hudBtns {
    display: flex;
    gap: 6px;
  }
  #menuOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #menuCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 3px solid #8a6a3a;
    border-radius: 8px;
    padding: 10px 12px;
    width: 60%;
    max-height: 75%;
    overflow-y: auto;
    font-size: 12px;
  }
  #menuTabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tabBtn {
    flex: 1;
    padding: 4px 0;
    background: #e3d3ad;
    border: 1px solid #8a6a3a;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .tabBtn.active {
    background: #8a6a3a;
    color: white;
  }
  .dexRow {
    border-bottom: 1px solid #d8c6a0;
    padding: 5px 0;
    font-size: 11px;
  }
  .dexRow .dexName {
    font-weight: bold;
  }
  .dexRow .dexLoc {
    color: #7a6a50;
    font-size: 11px;
  }
  .dexRow .dexMemory {
    margin-top: 4px;
    line-height: 1.4;
  }
  .mapRow {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid #d8c6a0;
    padding: 6px 2px;
    font-size: 11px;
  }
  .mapStatus {
    color: #7a6a50;
    white-space: nowrap;
  }
  .mapClickable {
    cursor: pointer;
  }
  .mapClickable:hover {
    background: #e9dcbb;
  }
  #settingsPanel label {
    font-size: 12px;
    display: block;
    margin-bottom: 10px;
  }
  #resetBtn, #closeMenuBtn {
    background: #8a6a3a;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  #closeMenuBtn {
    margin-top: 10px;
    width: 100%;
  }
  #popup {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #popupCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 4px solid #8a6a3a;
    border-radius: 8px;
    padding: 18px 22px;
    max-width: 80%;
    text-align: center;
  }
  #popupCard h2 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  #popupCard p {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
  }
  #popupCard .hint {
    margin-top: 14px;
    font-size: 12px;
    color: #7a6a50;
  }
</style>
</head>
<body>
  <h1>Faded Memory <span class="subtitle">빛바랜 기억</span></h1>

  <div id="gameWrap">
    <canvas id="game" width="480" height="320"></canvas>

    <div id="hud">
      <span>가족집 마당 · 추억 <span id="count">0</span>/3</span>
      <div class="hudBtns">
        <button id="muteBtn" title="음악 켜기/끄기">🔈</button>
        <button id="menuBtn" title="도감 / 설정">☰</button>
      </div>
    </div>

    <div id="popup">
      <div id="popupCard">
        <h2 id="popupName"></h2>
        <p id="popupMemory"></p>
        <div class="hint" id="popupHint">스페이스바를 누르면 닫혀요</div>
      </div>
    </div>

    <div id="menuOverlay">
      <div id="menuCard">
        <div id="menuTabs">
          <button class="tabBtn active" data-tab="dex">도감</button>
          <button class="tabBtn" data-tab="map">지도</button>
          <button class="tabBtn" data-tab="settings">설정</button>
        </div>
        <div id="dexPanel"></div>
        <div id="mapPanel" style="display:none;"></div>
        <div id="settingsPanel" style="display:none;">
          <label>음악 크기: <input type="range" id="volumeSlider" min="0" max="100" value="50"></label>
          <button id="resetBtn">진행 상황 초기화</button>
        </div>
        <button id="closeMenuBtn">닫기</button>
      </div>
    </div>
  </div>

  <div id="caption">방향키로 이동 · 가까이 가면 뜨는 표시를 보고 스페이스바로 줍기 · 현관문 앞에서 쉬프트키로 집 안에 들어가기</div>
  <a href="../index.html">← 게임 목록으로 돌아가기</a>

  <audio id="bgm" src="audio/Home - Toby Fox.mp3" loop preload="auto"></audio>

  <script src="data.js"></script>
  <script src="pixel-art.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const countEl = document.getElementById("count");
    const popup = document.getElementById("popup");
    const popupName = document.getElementById("popupName");
    const popupMemory = document.getElementById("popupMemory");
    const popupHint = document.getElementById("popupHint");
    const muteBtn = document.getElementById("muteBtn");

    // === 배경음악 (실제 노래 파일을 반복 재생) ===
    const bgm = document.getElementById("bgm");
    bgm.volume = 0.5;
    let musicStarted = false;
    const bgmState = restoreBgmState(bgm);
    if (bgmState) {
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
      if (bgmState.playing) {
        // 자동재생이 막혀있으면 이 play()는 조용히 실패하고, musicStarted는 그대로 false로 남아서
        // 첫 키 입력 때 startMusic()이 다시 시도함
        bgm.play().then(() => { musicStarted = true; }).catch(() => {});
      }
    }
    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgm.play().catch(() => {});
    }
    document.addEventListener("keydown", () => startMusic(), { once: true });
    muteBtn.addEventListener("click", () => {
      startMusic();
      bgm.muted = !bgm.muted;
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
    });
    // 다음 맵으로 넘어가기 직전에 현재 재생 위치를 저장해서, 다음 페이지에서 이어서 재생되게 함
    window.addEventListener("pagehide", () => saveBgmState(bgm));

    // === 메뉴 (도감 / 설정) ===
    const menuBtn = document.getElementById("menuBtn");
    const menuOverlay = document.getElementById("menuOverlay");
    const dexPanel = document.getElementById("dexPanel");
    const mapPanel = document.getElementById("mapPanel");
    const settingsPanel = document.getElementById("settingsPanel");
    const volumeSlider = document.getElementById("volumeSlider");
    const resetBtn = document.getElementById("resetBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const tabBtns = document.querySelectorAll(".tabBtn");

    function openMenu() {
      if (popupOpen) return;
      menuOpen = true;
      renderDex(dexPanel);
      renderLocationList(mapPanel, "yard");
      menuOverlay.style.display = "flex";
    }

    function closeMenu() {
      menuOpen = false;
      menuOverlay.style.display = "none";
    }

    menuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { menuOpen ? closeMenu() : openMenu(); }
    });
    // 메뉴 바깥(어두운 배경) 부분을 클릭하면 자동으로 닫힘
    menuOverlay.addEventListener("click", (e) => {
      if (e.target === menuOverlay) closeMenu();
    });

    tabBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        tabBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        dexPanel.style.display = tab === "dex" ? "block" : "none";
        mapPanel.style.display = tab === "map" ? "block" : "none";
        settingsPanel.style.display = tab === "settings" ? "block" : "none";
      });
    });

    volumeSlider.addEventListener("input", () => {
      bgm.volume = volumeSlider.value / 100;
    });

    resetBtn.addEventListener("click", () => {
      if (confirm("정말 처음부터 다시 시작할까? 모은 추억이 모두 사라져!")) {
        saveCollected([]);
        items.forEach((i) => (i.collected = false));
        countEl.textContent = "0";
        renderDex(dexPanel);
      }
    });

    // 도트 그리기 도구(pixelBlock, pixelCircle, pixelRoof, ditherGround, drawCharacter)는
    // games/pixel-art.js 에서 가져옴 — 마당/우물 등 모든 맵이 같은 그림 스타일을 쓰도록 공통 파일로 뺐음

    const player = {
      x: 240,
      y: 250,
      speed: 2,
      direction: "down",
      moving: false,
      crouching: false,
      crouchTimer: 0,
      walkFrame: 0,
      walkTimer: 0
    };

    let popupOpen = false;
    let menuOpen = false;

    // 우물 맵에서 왼쪽 끝으로 걸어나와 이 맵(마당)으로 돌아온 경우,
    // 저장해둔 y 위치에 맞춰 오른쪽 끝에서 다시 시작하게 해줌
    const arriving = popMapTransition();
    if (arriving && arriving.dir === "left") {
      player.x = canvas.width - 21;
      player.y = Math.max(40, Math.min(canvas.height - 10, arriving.pos));
      player.direction = "left";
    }
    markVisitedIfNew("yard");

    // === 시작 인트로: 우물에서 돌아온 게 아니라 처음(또는 새로고침으로) 들어온 경우에만 보여줌 ===
    // 아이템을 주울 때 쓰는 추억 팝업 카드를 그대로 재사용해서, 짧은 이야기를 여러 장으로 나눠 보여줌
    const INTRO_SLIDES = [
      "소년은 여름방학을 맞아 할머니, 할아버지 댁에 며칠 머물게 되었다.",
      "오랜만에 찾아온 시골집은 예전 그대로였다. 마당의 나무도, 장독대도, 모든 게 낯익었다.",
      "딱히 할 일이 없어 심심해진 소년은 집 안팎을 돌아다니며 구경하기로 했다.",
      "여기저기 낡고 부서진 물건들이 눈에 띈다. 만질 때마다 어딘가 익숙한 기억이 스쳐 지나가는 듯하다.",
      "소년은 이 묘한 기분을 따라, 마당 구석구석을 살펴보기로 했다."
    ];
    let introIndex = 0;
    let introActive = arriving === null && !hasIntroShown();

    function showIntroSlide() {
      popupName.textContent = "";
      popupMemory.textContent = INTRO_SLIDES[introIndex];
      popupHint.textContent = introIndex === INTRO_SLIDES.length - 1 ? "스페이스바로 시작하기" : "스페이스바로 계속";
      popup.style.display = "flex";
      popupOpen = true;
    }

    function advanceIntro() {
      introIndex++;
      if (introIndex >= INTRO_SLIDES.length) {
        introActive = false;
        markIntroShown();
        popupHint.textContent = "스페이스바를 누르면 닫혀요";
        closePopup();
      } else {
        showIntroSlide();
      }
    }

    if (introActive) showIntroSlide();

    // 부딪히면 막히는 것들(집, 나무, 덤불, 장독). 꽃밭처럼 평평한 바닥 장식은 넣지 않음 — 그냥 지나갈 수 있음
    const OBSTACLES = [
      { x: 150, y: 20, w: 180, h: 90 }, // 집
      { x: 45, y: 165, r: 16 }, // 나무
      { x: 400, y: 118, r: 17 }, // 덤불
      { x: 422, y: 122, r: 13 },
      { x: 390, y: 262, r: 16 }, // 장독
      { x: 415, y: 272, r: 14 },
      { x: 370, y: 282, r: 12 }
    ];

    // 이 맵(가족집 마당)에 숨겨진 아이템들의 위치. 내용(이름/추억)은 data.js의 ALL_ITEMS에서 가져옴
    const YARD_POSITIONS = {
      trowel: { x: 95, y: 250, radius: 28 },
      tricycle: { x: 410, y: 110, radius: 28 },
      jarlid: { x: 400, y: 270, radius: 28 }
    };

    const collectedIds = loadCollected();
    const items = ALL_ITEMS
      .filter(i => YARD_POSITIONS[i.id])
      .map(i => ({ ...i, ...YARD_POSITIONS[i.id], collected: collectedIds.includes(i.id) }));
    countEl.textContent = items.filter(i => i.collected).length;

    let nearItem = null;
    let approachItem = null;

    // 집 현관문 위치. 가까이 가면 쉬프트키로 집 안에 들어갈 수 있음
    const DOOR = { x: 240, y: 90, radius: 32 };
    let nearDoor = false;

    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") {
        e.preventDefault();
        if (introActive) {
          advanceIntro();
        } else if (popupOpen) {
          closePopup();
        } else if (!player.crouching) {
          player.crouching = true;
          player.crouchTimer = 0;
          // 아이템 근처에서 웅크리면 줍는 동작(길게), 그냥 웅크리면 짧게 끝남
          player.crouchDuration = nearItem ? 70 : 28;
        }
      }
      if (e.key === "Shift" && nearDoor && !popupOpen && !menuOpen) {
        location.href = "family-house.html";
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function closePopup() {
      popup.style.display = "none";
      popupOpen = false;
    }

    function collectNearItem() {
      if (!nearItem) return;
      nearItem.collected = true;
      markCollected(nearItem.id);
      playPickupChime();
      countEl.textContent = items.filter(i => i.collected).length;
      popupName.textContent = nearItem.name;
      popupMemory.textContent = nearItem.memory;
      popup.style.display = "flex";
      popupOpen = true;
      nearItem = null;
    }

    function update() {
      if (popupOpen || menuOpen) return; // 팝업/메뉴가 떠있는 동안은 움직임 정지

      if (player.crouching) {
        player.crouchTimer++;
        if (player.crouchTimer === 35) collectNearItem(); // 웅크리는 동작 중간에 줍기 처리
        if (player.crouchTimer > player.crouchDuration) player.crouching = false;
        return;
      }

      let dx = 0, dy = 0;
      if (keys["ArrowUp"]) { dy = -1; player.direction = "up"; }
      else if (keys["ArrowDown"]) { dy = 1; player.direction = "down"; }
      else if (keys["ArrowLeft"]) { dx = -1; player.direction = "left"; }
      else if (keys["ArrowRight"]) { dx = 1; player.direction = "right"; }

      player.moving = dx !== 0 || dy !== 0;

      if (player.moving) {
        moveWithObstacles(player, dx * player.speed, dy * player.speed, OBSTACLES);

        player.walkTimer++;
        if (player.walkTimer >= 8) {
          player.walkTimer = 0;
          player.walkFrame = player.walkFrame === 0 ? 1 : 0;
        }
      } else {
        player.walkTimer = 0;
        player.walkFrame = 0;
      }

      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(40, Math.min(canvas.height - 10, player.y));

      // 오른쪽 끝까지 걸어가면 우물 맵으로 넘어감
      if (player.moving && player.direction === "right" && player.x >= canvas.width - 20) {
        setMapTransition(player.y, "right");
        location.href = "path-yard-well.html";
        return;
      }

      // 현관문 근처인지 확인 (가까우면 쉬프트키로 들어가기 안내가 뜸)
      nearDoor = Math.hypot(player.x - DOOR.x, player.y - DOOR.y) < DOOR.radius;

      // 가까운 미발견 아이템 찾기 (숨겨진 아이템은 가까이 가야만 보임)
      // 줍기 거리(radius)보다 넓은 범위(outerRadius)에서는 희미한 힌트만 먼저 보여줌
      nearItem = null;
      approachItem = null;
      let approachDist = Infinity;
      for (const item of items) {
        if (item.collected) continue;
        const dist = Math.hypot(player.x - item.x, player.y - item.y);
        const outerRadius = item.radius * 2.5;
        if (dist < item.radius) { nearItem = item; }
        else if (dist < outerRadius && dist < approachDist) {
          approachItem = item;
          approachDist = dist;
        }
      }
    }

    // === 배경 그리기 (전부 작은 도트로 이루어짐) ===
    // 배경은 움직이지 않으니 매 프레임 다시 그리면 너무 느려짐(점이 수만 개라서).
    // 그래서 이 함수는 딱 한 번만 호출해서 별도의 캔버스(bgCanvas)에 그려두고,
    // 매 프레임에는 그 결과 이미지를 복사해서 붙이기만 함(ctx.drawImage).
    function drawYard(ctx) {
      // 잔디 바닥: 단색이 아니라 점박이 무늬를 넣어서 진짜 잔디 질감처럼 보이게 함
      ditherGround(ctx, 0, 0, canvas.width, canvas.height, "#8fc36b", "#79ab57");

      // 집
      pixelBlock(ctx, 150, 20, 180, 90, "#e8d9b5");
      pixelRoof(ctx, 240, 20, 110, 50, "#7a3b2e");
      pixelBlock(ctx, 225, 70, 30, 40, "#4a3322"); // 문

      // 나무
      pixelBlock(ctx, 40, 150, 10, 40, "#6b4423");
      pixelCircle(ctx, 45, 140, 26, "#4f8f3b");

      // 집 옆 덤불 (세발자전거가 그 뒤에 숨겨져 있다는 힌트)
      pixelCircle(ctx, 400, 118, 17, "#5a8a3a");
      pixelCircle(ctx, 422, 122, 13, "#5a8a3a");

      // 장독대 (장독 3개)
      pixelCircle(ctx, 390, 262, 16, "#6b3e2a");
      pixelCircle(ctx, 415, 272, 14, "#6b3e2a");
      pixelCircle(ctx, 370, 282, 12, "#6b3e2a");

      // 꽃밭 (흙 위에 꽃)
      ditherGround(ctx, 60, 230, 70, 25, "#5a8a3a", "#456b2c", 22);
      const flowerColors = ["#e85d75", "#f2d33b", "#f5f0e6"];
      for (let i = 0; i < 8; i++) {
        pixelCircle(ctx, 65 + i * 8, 235 + (i % 2) * 10, 3, flowerColors[i % flowerColors.length]);
      }

      // 오른쪽 끝 흙길: 여기로 걸어나가면 마당과 우물을 잇는 오솔길로 이어짐
      ditherGround(ctx, 460, 0, 20, canvas.height, "#c9a86a", "#a4855a", 22);
    }

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = canvas.width;
    bgCanvas.height = canvas.height;
    drawYard(bgCanvas.getContext("2d"));

    function drawItemHint() {
      // 아직 줍기 거리는 아니지만 근처에 왔을 때: 희미하고 느린 반짝임만 보여줌
      if (!nearItem && approachItem) {
        const t = (Date.now() % 1400) / 1400;
        const alpha = 0.15 + Math.sin(t * Math.PI * 2) * 0.1;
        ctx.globalAlpha = Math.max(0.05, alpha);
        pixelCircle(ctx, approachItem.x, approachItem.y - 20, 5, "#fff7c2");
        ctx.globalAlpha = 1;
      }

      if (!nearItem) return;
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("스페이스바로 줍기", nearItem.x, nearItem.y - 40);
      // 반짝이는 표시 (가까울 때는 뚜렷하고 빠르게)
      const t = (Date.now() % 600) / 600;
      const r = 5 + Math.sin(t * Math.PI * 2) * 2.5;
      pixelCircle(ctx, nearItem.x, nearItem.y - 25, r, "#fff04d");
    }

    function drawDoorHint() {
      if (!nearDoor) return;
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("쉬프트키로 들어가기", DOOR.x, DOOR.y - 28);
    }

    function draw() {
      ctx.drawImage(bgCanvas, 0, 0);
      drawItemHint();
      drawDoorHint();
      drawCharacter(ctx, player.x, player.y, player.direction, player.walkFrame, player.crouching);

      if (items.every(i => i.collected)) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        ctx.fillStyle = "white";
        ctx.font = "14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("이 곳의 추억을 모두 모았어! 오른쪽 흙길로 가보자", canvas.width / 2, canvas.height - 16);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
