<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Faded Memory (л№ӣл°”лһң кё°м–ө)</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  h1 {
    margin-bottom: 4px;
  }
  h1 .subtitle {
    font-size: 0.6em;
    color: #aaa;
    font-weight: normal;
  }
  #gameWrap {
    position: relative;
    display: inline-block;
    margin-top: 10px;
  }
  canvas {
    background: #7fae5a;
    border: 4px solid white;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }
  #caption {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
  }
  a {
    color: #9cf;
    margin-top: 12px;
  }
  #muteBtn, #menuBtn {
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .hudBtns {
    display: flex;
    gap: 6px;
  }
  #menuOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #menuCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 3px solid #8a6a3a;
    border-radius: 8px;
    padding: 10px 12px;
    width: 60%;
    max-height: 75%;
    overflow-y: auto;
    font-size: 12px;
  }
  #menuTabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tabBtn {
    flex: 1;
    padding: 4px 0;
    background: #e3d3ad;
    border: 1px solid #8a6a3a;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .tabBtn.active {
    background: #8a6a3a;
    color: white;
  }
  .dexRow {
    border-bottom: 1px solid #d8c6a0;
    padding: 5px 0;
    font-size: 11px;
  }
  .dexRow .dexName {
    font-weight: bold;
  }
  .dexRow .dexLoc {
    color: #7a6a50;
    font-size: 11px;
  }
  .dexRow .dexMemory {
    margin-top: 4px;
    line-height: 1.4;
  }
  .mapRow {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid #d8c6a0;
    padding: 6px 2px;
    font-size: 11px;
  }
  .mapStatus {
    color: #7a6a50;
    white-space: nowrap;
  }
  .mapClickable {
    cursor: pointer;
  }
  .mapClickable:hover {
    background: #e9dcbb;
  }
  #settingsPanel label {
    font-size: 12px;
    display: block;
    margin-bottom: 10px;
  }
  #resetBtn, #closeMenuBtn {
    background: #8a6a3a;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  #closeMenuBtn {
    margin-top: 10px;
    width: 100%;
  }
</style>
</head>
<body>
  <h1>Faded Memory <span class="subtitle">л№ӣл°”лһң кё°м–ө</span></h1>

  <div id="gameWrap">
    <canvas id="game" width="480" height="320"></canvas>

    <div id="hud">
      <span>л…јл‘җл Ғкіј лҸҢлӢӨлҰ¬лҘј мһҮлҠ” кёё</span>
      <div class="hudBtns">
        <button id="muteBtn" title="мқҢм•… мјңкё°/лҒ„кё°">рҹ”Ҳ</button>
        <button id="menuBtn" title="лҸ„к°җ / м„Өм •">вҳ°</button>
      </div>
    </div>

    <div id="menuOverlay">
      <div id="menuCard">
        <div id="menuTabs">
          <button class="tabBtn active" data-tab="dex">лҸ„к°җ</button>
          <button class="tabBtn" data-tab="map">м§ҖлҸ„</button>
          <button class="tabBtn" data-tab="settings">м„Өм •</button>
        </div>
        <div id="dexPanel"></div>
        <div id="mapPanel" style="display:none;"></div>
        <div id="settingsPanel" style="display:none;">
          <label>мқҢм•… нҒ¬кё°: <input type="range" id="volumeSlider" min="0" max="100" value="50"></label>
          <button id="resetBtn">м§„н–ү мғҒнҷ© мҙҲкё°нҷ”</button>
        </div>
        <button id="closeMenuBtn">лӢ«кё°</button>
      </div>
    </div>
  </div>

  <div id="caption">л°©н–ҘнӮӨлЎң мқҙлҸҷ В· л‘‘кёёмқ„ л”°лқјк°Җл©ҙ л…јл‘җл Ғкіј лҸҢлӢӨлҰ¬к°Җ мқҙм–ҙм ёмҡ”</div>
  <a href="../index.html">вҶҗ кІҢмһ„ лӘ©лЎқмңјлЎң лҸҢм•„к°Җкё°</a>

  <audio id="bgm" src="audio/Home - Toby Fox.mp3" loop preload="auto"></audio>

  <script src="data.js"></script>
  <script src="pixel-art.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const muteBtn = document.getElementById("muteBtn");

    const bgm = document.getElementById("bgm");
    bgm.volume = 0.5;
    let musicStarted = false;
    const bgmState = restoreBgmState(bgm);
    if (bgmState) {
      muteBtn.textContent = bgm.muted ? "рҹ”Ү" : "рҹ”Ҳ";
      if (bgmState.playing) {
        // мһҗлҸҷмһ¬мғқмқҙ л§үнҳҖмһҲмңјл©ҙ мқҙ play()лҠ” мЎ°мҡ©нһҲ мӢӨнҢЁн•ҳкі , musicStartedлҠ” к·ёлҢҖлЎң falseлЎң лӮЁм•„м„ң
        // мІ« нӮӨ мһ…л Ҙ л•Ң startMusic()мқҙ лӢӨмӢң мӢңлҸ„н•Ё
        bgm.play().then(() => { musicStarted = true; }).catch(() => {});
      }
    }
    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgm.play().catch(() => {});
    }
    document.addEventListener("keydown", () => startMusic(), { once: true });
    muteBtn.addEventListener("click", () => {
      startMusic();
      bgm.muted = !bgm.muted;
      muteBtn.textContent = bgm.muted ? "рҹ”Ү" : "рҹ”Ҳ";
    });
    // лӢӨмқҢ л§өмңјлЎң л„ҳм–ҙк°Җкё° м§Ғм „м—җ нҳ„мһ¬ мһ¬мғқ мң„м№ҳлҘј м ҖмһҘн•ҙм„ң, лӢӨмқҢ нҺҳмқҙм§Җм—җм„ң мқҙм–ҙм„ң мһ¬мғқлҗҳкІҢ н•Ё
    window.addEventListener("pagehide", () => saveBgmState(bgm));

    // === л©”лүҙ (лҸ„к°җ / м§ҖлҸ„ / м„Өм •) ===
    const menuBtn = document.getElementById("menuBtn");
    const menuOverlay = document.getElementById("menuOverlay");
    const dexPanel = document.getElementById("dexPanel");
    const mapPanel = document.getElementById("mapPanel");
    const settingsPanel = document.getElementById("settingsPanel");
    const volumeSlider = document.getElementById("volumeSlider");
    const resetBtn = document.getElementById("resetBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const tabBtns = document.querySelectorAll(".tabBtn");

    let menuOpen = false;

    function openMenu() {
      menuOpen = true;
      renderDex(dexPanel);
      renderLocationList(mapPanel, null);
      menuOverlay.style.display = "flex";
    }
    function closeMenu() {
      menuOpen = false;
      menuOverlay.style.display = "none";
    }
    menuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { menuOpen ? closeMenu() : openMenu(); }
    });
    menuOverlay.addEventListener("click", (e) => {
      if (e.target === menuOverlay) closeMenu();
    });
    tabBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        tabBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        dexPanel.style.display = tab === "dex" ? "block" : "none";
        mapPanel.style.display = tab === "map" ? "block" : "none";
        settingsPanel.style.display = tab === "settings" ? "block" : "none";
      });
    });
    volumeSlider.addEventListener("input", () => { bgm.volume = volumeSlider.value / 100; });
    resetBtn.addEventListener("click", () => {
      if (confirm("м •л§җ мІҳмқҢл¶Җн„° лӢӨмӢң мӢңмһ‘н• к№Ң? лӘЁмқҖ м¶”м–өмқҙ лӘЁл‘җ мӮ¬лқјм ё!")) {
        saveCollected([]);
        renderDex(dexPanel);
      }
    });

    const player = {
      x: 240,
      y: 165,
      speed: 2,
      direction: "down",
      moving: false,
      crouching: false,
      walkFrame: 0,
      walkTimer: 0
    };

    // л…јл‘җл Ғ/лҸҢлӢӨлҰ¬ м–‘мӘҪм—җм„ң л“Өм–ҙмҳ¬ мҲҳ мһҲмңјлӢҲ, м–ҙлҠҗ мӘҪм—җм„ң мҷ”лҠ”м§Җм—җ л§һм¶° л°ҳлҢҖмӘҪ лҒқм—җм„ң мӢңмһ‘н•Ё
    const arriving = popMapTransition();
    if (arriving && arriving.dir === "right") {
      player.x = 21;
      player.y = arriving.pos;
      player.direction = "right";
    } else if (arriving && arriving.dir === "left") {
      player.x = canvas.width - 21;
      player.y = arriving.pos;
      player.direction = "left";
    }
    player.y = Math.max(140, Math.min(190, player.y));

    // н’Җл°ӯ(мң„/м•„лһҳ)м—җлҠ” л¶Җл”ӘнҳҖ л§үнһҲкі , к°ҖмҡҙлҚ° мҳӨмҶ”кёёл§Ң м§ҖлӮҳк°Ҳ мҲҳ мһҲкІҢ н•Ё
    const OBSTACLES = [
      { x: 0, y: 0, w: 480, h: 130 }, // мң„мӘҪ н’Җл°ӯ
      { x: 0, y: 200, w: 480, h: 120 } // м•„лһҳмӘҪ н’Җл°ӯ
    ];

    const keys = {};
    document.addEventListener("keydown", (e) => { keys[e.key] = true; });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function update() {
      if (menuOpen) return;

      let dx = 0, dy = 0;
      if (keys["ArrowUp"]) { dy = -1; player.direction = "up"; }
      else if (keys["ArrowDown"]) { dy = 1; player.direction = "down"; }
      else if (keys["ArrowLeft"]) { dx = -1; player.direction = "left"; }
      else if (keys["ArrowRight"]) { dx = 1; player.direction = "right"; }

      player.moving = dx !== 0 || dy !== 0;

      if (player.moving) {
        moveWithObstacles(player, dx * player.speed, dy * player.speed, OBSTACLES);
        player.walkTimer++;
        if (player.walkTimer >= 8) {
          player.walkTimer = 0;
          player.walkFrame = player.walkFrame === 0 ? 1 : 0;
        }
      } else {
        player.walkTimer = 0;
        player.walkFrame = 0;
      }

      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(40, Math.min(canvas.height - 10, player.y));

      if (player.moving && player.direction === "left" && player.x <= 20) {
        setMapTransition(player.y, "left");
        location.href = "ricefield.html";
        return;
      }
      if (player.moving && player.direction === "right" && player.x >= canvas.width - 20) {
        setMapTransition(player.y, "right");
        location.href = "bridge.html";
        return;
      }
    }

    // === л°°кІҪ к·ёлҰ¬кё° ===
    function drawPath(ctx) {
      ditherGround(ctx, 0, 0, canvas.width, 130, "#7fae5a", "#6b9c47", 18); // мң„мӘҪ н’Җл°ӯ
      ditherGround(ctx, 0, 200, canvas.width, 120, "#7fae5a", "#6b9c47", 18); // м•„лһҳмӘҪ н’Җл°ӯ
      ditherGround(ctx, 0, 130, canvas.width, 70, "#a99a7a", "#8a7d62", 20); // к°ҖмҡҙлҚ° л‘‘кёё(нқҷ)

      // л‘‘кёё мһ…кө¬лҘј м•ҢлҰ¬лҠ” лӮҳл¬ҙ н‘ңм§ҖнҢҗ(мһҘмӢқ, л¶Җл”ӘнһҲм§Җ м•ҠмқҢ вҖ” мқҙлҜё мң„м•„лһҳ н’Җл°ӯмқҙ кёёмқ„ мўҒнҳҖлҶ“мқҢ)
      pixelBlock(ctx, 234, 116, 6, 50, "#6b4423");
      pixelBlock(ctx, 220, 108, 34, 22, "#8a6a3a");

      // кёёк°Җмқҳ лҸҢл©©мқҙ
      pixelCircle(ctx, 60, 150, 9, "#9a958a", { outline: false });
      pixelCircle(ctx, 420, 180, 11, "#9a958a", { outline: false });

      // кёёк°Җмқҳ мһ‘мқҖ н’Җ
      for (let i = 0; i < 5; i++) {
        pixelCircle(ctx, 40 + i * 90, 145 + (i % 2) * 30, 3, "#4f8f3b", { outline: false });
      }

      // л…јл‘җл Ғ мӘҪ(мҷјмӘҪ)м—җ к°Җк№ҢмӣҢм§Җл©° ліҙмқҙлҠ” нҷ©кёҲл№ӣ лІј мқҙмӮӯ
      ctx.strokeStyle = "#8a6a1f";
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const x = 30 + i * 14;
        const y = 150 + (i % 2) * 10;
        ctx.beginPath();
        ctx.moveTo(x, y + 10);
        ctx.lineTo(x - 3, y);
        ctx.moveTo(x, y + 10);
        ctx.lineTo(x + 3, y);
        ctx.stroke();
      }

      // лҸҢлӢӨлҰ¬ мӘҪ(мҳӨлҘёмӘҪ)м—җ к°Җк№ҢмӣҢм§Җл©° ліҙмқҙлҠ” мқҙлҒј мһҗкөӯ
      pixelCircle(ctx, 430, 155, 9, "#6b8a5a", { outline: false });
      pixelCircle(ctx, 450, 185, 7, "#6b8a5a", { outline: false });
    }

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = canvas.width;
    bgCanvas.height = canvas.height;
    drawPath(bgCanvas.getContext("2d"));

    function draw() {
      ctx.drawImage(bgCanvas, 0, 0);
      drawCharacter(ctx, player.x, player.y, player.direction, player.walkFrame, player.crouching);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
