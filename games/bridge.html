<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Faded Memory (빛바랜 기억)</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  h1 {
    margin-bottom: 4px;
  }
  h1 .subtitle {
    font-size: 0.6em;
    color: #aaa;
    font-weight: normal;
  }
  #gameWrap {
    position: relative;
    display: inline-block;
    margin-top: 10px;
  }
  canvas {
    background: #7fc4d4;
    border: 4px solid white;
    display: block;
  }
  #hud {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
  }
  #caption {
    margin-top: 10px;
    font-size: 13px;
    color: #aaa;
    text-align: center;
  }
  a {
    color: #9cf;
    margin-top: 12px;
  }
  #muteBtn, #menuBtn {
    background: transparent;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .hudBtns {
    display: flex;
    gap: 6px;
  }
  #menuOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #menuCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 3px solid #8a6a3a;
    border-radius: 8px;
    padding: 10px 12px;
    width: 60%;
    max-height: 75%;
    overflow-y: auto;
    font-size: 12px;
  }
  #menuTabs {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .tabBtn {
    flex: 1;
    padding: 4px 0;
    background: #e3d3ad;
    border: 1px solid #8a6a3a;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .tabBtn.active {
    background: #8a6a3a;
    color: white;
  }
  .dexRow {
    border-bottom: 1px solid #d8c6a0;
    padding: 5px 0;
    font-size: 11px;
  }
  .dexRow .dexName {
    font-weight: bold;
  }
  .dexRow .dexLoc {
    color: #7a6a50;
    font-size: 11px;
  }
  .dexRow .dexMemory {
    margin-top: 4px;
    line-height: 1.4;
  }
  .mapRow {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    border-bottom: 1px solid #d8c6a0;
    padding: 6px 2px;
    font-size: 11px;
  }
  .mapStatus {
    color: #7a6a50;
    white-space: nowrap;
  }
  .mapClickable {
    cursor: pointer;
  }
  .mapClickable:hover {
    background: #e9dcbb;
  }
  #settingsPanel label {
    font-size: 12px;
    display: block;
    margin-bottom: 10px;
  }
  #resetBtn, #closeMenuBtn {
    background: #8a6a3a;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  #closeMenuBtn {
    margin-top: 10px;
    width: 100%;
  }
  #popup {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
  }
  #popupCard {
    background: #f5ecd7;
    color: #3a2c1a;
    border: 4px solid #8a6a3a;
    border-radius: 8px;
    padding: 18px 22px;
    max-width: 80%;
    text-align: center;
  }
  #popupCard h2 {
    margin: 0 0 10px;
    font-size: 18px;
  }
  #popupCard p {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
  }
  #popupCard .hint {
    margin-top: 14px;
    font-size: 12px;
    color: #7a6a50;
  }
</style>
</head>
<body>
  <h1>Faded Memory <span class="subtitle">빛바랜 기억</span></h1>

  <div id="gameWrap">
    <canvas id="game" width="480" height="320"></canvas>

    <div id="hud">
      <span>이끼 낀 돌다리 · 추억 <span id="count">0</span>/2</span>
      <div class="hudBtns">
        <button id="muteBtn" title="음악 켜기/끄기">🔈</button>
        <button id="menuBtn" title="도감 / 설정">☰</button>
      </div>
    </div>

    <div id="popup">
      <div id="popupCard">
        <h2 id="popupName"></h2>
        <p id="popupMemory"></p>
        <div class="hint" id="popupHint">스페이스바를 누르면 닫혀요</div>
      </div>
    </div>

    <div id="menuOverlay">
      <div id="menuCard">
        <div id="menuTabs">
          <button class="tabBtn active" data-tab="dex">도감</button>
          <button class="tabBtn" data-tab="map">지도</button>
          <button class="tabBtn" data-tab="settings">설정</button>
        </div>
        <div id="dexPanel"></div>
        <div id="mapPanel" style="display:none;"></div>
        <div id="settingsPanel" style="display:none;">
          <label>음악 크기: <input type="range" id="volumeSlider" min="0" max="100" value="50"></label>
          <button id="resetBtn">진행 상황 초기화</button>
        </div>
        <button id="closeMenuBtn">닫기</button>
      </div>
    </div>
  </div>

  <div id="caption">방향키로 이동 · 가까이 가면 뜨는 표시를 보고 스페이스바로 줍기 · 왼쪽 길로 가면 논두렁으로 돌아가요</div>
  <a href="../index.html">← 게임 목록으로 돌아가기</a>

  <audio id="bgm" src="audio/Home - Toby Fox.mp3" loop preload="auto"></audio>

  <script src="data.js"></script>
  <script src="pixel-art.js"></script>
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const countEl = document.getElementById("count");
    const popup = document.getElementById("popup");
    const popupName = document.getElementById("popupName");
    const popupMemory = document.getElementById("popupMemory");
    const popupHint = document.getElementById("popupHint");
    const muteBtn = document.getElementById("muteBtn");

    // === 배경음악 (실제 노래 파일을 반복 재생) ===
    const bgm = document.getElementById("bgm");
    bgm.volume = 0.5;
    let musicStarted = false;
    const bgmState = restoreBgmState(bgm);
    if (bgmState) {
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
      if (bgmState.playing) {
        // 자동재생이 막혀있으면 이 play()는 조용히 실패하고, musicStarted는 그대로 false로 남아서
        // 첫 키 입력 때 startMusic()이 다시 시도함
        bgm.play().then(() => { musicStarted = true; }).catch(() => {});
      }
    }
    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      bgm.play().catch(() => {});
    }
    document.addEventListener("keydown", () => startMusic(), { once: true });
    muteBtn.addEventListener("click", () => {
      startMusic();
      bgm.muted = !bgm.muted;
      muteBtn.textContent = bgm.muted ? "🔇" : "🔈";
    });
    // 다음 맵으로 넘어가기 직전에 현재 재생 위치를 저장해서, 다음 페이지에서 이어서 재생되게 함
    window.addEventListener("pagehide", () => saveBgmState(bgm));

    // === 메뉴 (도감 / 지도 / 설정) ===
    const menuBtn = document.getElementById("menuBtn");
    const menuOverlay = document.getElementById("menuOverlay");
    const dexPanel = document.getElementById("dexPanel");
    const mapPanel = document.getElementById("mapPanel");
    const settingsPanel = document.getElementById("settingsPanel");
    const volumeSlider = document.getElementById("volumeSlider");
    const resetBtn = document.getElementById("resetBtn");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const tabBtns = document.querySelectorAll(".tabBtn");

    function openMenu() {
      if (popupOpen) return;
      menuOpen = true;
      renderDex(dexPanel);
      renderLocationList(mapPanel, "bridge");
      menuOverlay.style.display = "flex";
    }

    function closeMenu() {
      menuOpen = false;
      menuOverlay.style.display = "none";
    }

    menuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") { menuOpen ? closeMenu() : openMenu(); }
    });
    menuOverlay.addEventListener("click", (e) => {
      if (e.target === menuOverlay) closeMenu();
    });

    tabBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        tabBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        dexPanel.style.display = tab === "dex" ? "block" : "none";
        mapPanel.style.display = tab === "map" ? "block" : "none";
        settingsPanel.style.display = tab === "settings" ? "block" : "none";
      });
    });

    volumeSlider.addEventListener("input", () => {
      bgm.volume = volumeSlider.value / 100;
    });

    resetBtn.addEventListener("click", () => {
      if (confirm("정말 처음부터 다시 시작할까? 모은 추억이 모두 사라져!")) {
        saveCollected([]);
        items.forEach((i) => (i.collected = false));
        countEl.textContent = "0";
        renderDex(dexPanel);
      }
    });

    // 도트 그리기 도구는 games/pixel-art.js 에서 가져옴 (마당/우물과 같은 스타일을 공유)

    const player = {
      x: 240,
      y: 165,
      speed: 2,
      direction: "down",
      moving: false,
      crouching: false,
      crouchTimer: 0,
      walkFrame: 0,
      walkTimer: 0
    };

    let popupOpen = false;
    let menuOpen = false;

    // 논두렁과 돌다리를 잇는 길 오른쪽 끝으로 걸어나와 이 맵(돌다리)으로 넘어온 경우,
    // 저장해둔 y 위치에 맞춰 왼쪽 끝에서 다시 시작하게 해줌
    const arriving = popMapTransition();
    if (arriving && arriving.dir === "right") {
      player.x = 21;
      player.y = Math.max(40, Math.min(canvas.height - 10, arriving.pos));
      player.direction = "right";
    }

    // 처음 와본 곳이면 짧은 설명을 한 번 보여줌(추억 팝업 카드를 재사용)
    if (markVisitedIfNew("bridge")) {
      popupName.textContent = "";
      popupMemory.textContent = "이끼가 잔뜩 낀 돌다리에 다다랐다. 다리 틈 사이로 보이는 물살이 제법 빠르다.";
      popupHint.textContent = "스페이스바를 누르면 닫혀요";
      popup.style.display = "flex";
      popupOpen = true;
    }

    // 부딪히면 막히는 것들(강물). 가운데 돌다리 위는 평평한 바닥이라 안 넣음
    const OBSTACLES = [
      { x: 0, y: 0, w: 480, h: 110 }, // 위쪽 강물
      { x: 0, y: 230, w: 480, h: 90 } // 아래쪽 강물
    ];

    // 이 맵(돌다리)에 숨겨진 아이템들의 위치. 내용(이름/추억)은 data.js의 ALL_ITEMS에서 가져옴
    // 다리 위 빈 자리에 그대로 놓여있어서 어느 방향에서 다가가도 주울 수 있음
    const BRIDGE_POSITIONS = {
      bikebell: { x: 150, y: 170, radius: 32 },
      photo: { x: 340, y: 170, radius: 32 }
    };

    const collectedIds = loadCollected();
    const items = ALL_ITEMS
      .filter(i => BRIDGE_POSITIONS[i.id])
      .map(i => ({ ...i, ...BRIDGE_POSITIONS[i.id], collected: collectedIds.includes(i.id) }));
    countEl.textContent = items.filter(i => i.collected).length;

    let nearItem = null;
    let approachItem = null;

    const keys = {};
    document.addEventListener("keydown", (e) => {
      keys[e.key] = true;
      if (e.key === " ") {
        e.preventDefault();
        if (popupOpen) {
          closePopup();
        } else if (!player.crouching) {
          player.crouching = true;
          player.crouchTimer = 0;
          // 아이템 근처에서 웅크리면 줍는 동작(길게), 그냥 웅크리면 짧게 끝남
          player.crouchDuration = nearItem ? 70 : 28;
        }
      }
    });
    document.addEventListener("keyup", (e) => { keys[e.key] = false; });

    function closePopup() {
      popup.style.display = "none";
      popupOpen = false;
    }

    function collectNearItem() {
      if (!nearItem) return;
      const isPhoto = nearItem.id === "photo";
      nearItem.collected = true;
      markCollected(nearItem.id);

      // 가족사진은 다른 추억을 전부 모은 뒤에만 주울 수 있게 막아뒀기 때문에(아래 nearItem 탐색 로직 참고),
      // 이걸 줍는 순간이 곧 13개 추억을 모두 모은 순간임 — 평소 팝업 대신 마지막 컷신으로 바로 넘어감
      if (isPhoto) {
        location.href = "ending.html";
        return;
      }

      playPickupChime();
      countEl.textContent = items.filter(i => i.collected).length;
      popupName.textContent = nearItem.name;
      popupMemory.textContent = nearItem.memory;
      popup.style.display = "flex";
      popupOpen = true;
      nearItem = null;
    }

    function update() {
      if (popupOpen || menuOpen) return; // 팝업/메뉴가 떠있는 동안은 움직임 정지

      if (player.crouching) {
        player.crouchTimer++;
        if (player.crouchTimer === 35) collectNearItem(); // 웅크리는 동작 중간에 줍기 처리
        if (player.crouchTimer > player.crouchDuration) player.crouching = false;
        return;
      }

      let dx = 0, dy = 0;
      if (keys["ArrowUp"]) { dy = -1; player.direction = "up"; }
      else if (keys["ArrowDown"]) { dy = 1; player.direction = "down"; }
      else if (keys["ArrowLeft"]) { dx = -1; player.direction = "left"; }
      else if (keys["ArrowRight"]) { dx = 1; player.direction = "right"; }

      player.moving = dx !== 0 || dy !== 0;

      if (player.moving) {
        moveWithObstacles(player, dx * player.speed, dy * player.speed, OBSTACLES);

        player.walkTimer++;
        if (player.walkTimer >= 8) {
          player.walkTimer = 0;
          player.walkFrame = player.walkFrame === 0 ? 1 : 0;
        }
      } else {
        player.walkTimer = 0;
        player.walkFrame = 0;
      }

      player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
      player.y = Math.max(40, Math.min(canvas.height - 10, player.y));

      // 왼쪽 끝까지 걸어가면 뒷산과 시냇가를 잇는 길로 돌아감
      if (player.moving && player.direction === "left" && player.x <= 20) {
        setMapTransition(player.y, "left");
        location.href = "path-ricefield-bridge.html";
        return;
      }

      // 가까운 미발견 아이템 찾기 (숨겨진 아이템은 가까이 가야만 보임)
      nearItem = null;
      approachItem = null;
      let approachDist = Infinity;
      for (const item of items) {
        if (item.collected) continue;
        // 가족사진은 다른 추억 12개를 전부 모으기 전까지는 위치와 상관없이 찾을 수 없음
        // (마지막에 발견하는 아이템이 되도록 일부러 막아둠 — 엔딩 컷신의 트리거 역할)
        if (item.id === "photo") {
          const others = ALL_ITEMS.filter((i) => i.id !== "photo").map((i) => i.id);
          if (!others.every((id) => loadCollected().includes(id))) continue;
        }
        const dist = Math.hypot(player.x - item.x, player.y - item.y);
        const outerRadius = item.radius * 2.5;
        if (dist < item.radius) { nearItem = item; }
        else if (dist < outerRadius && dist < approachDist) {
          approachItem = item;
          approachDist = dist;
        }
      }
    }

    // === 배경 그리기 (전부 작은 도트로 이루어짐) ===
    function drawBridge(ctx) {
      // 위/아래 강물
      ditherGround(ctx, 0, 0, canvas.width, 110, "#7fc4d4", "#5fa8ba", 16);
      ditherGround(ctx, 0, 230, canvas.width, 90, "#7fc4d4", "#5fa8ba", 16);
      ctx.strokeStyle = "rgba(255,255,255,0.4)";
      ctx.lineWidth = 2;
      [30, 270].forEach((bandY) => {
        for (let y = bandY; y < bandY + 60; y += 16) {
          ctx.beginPath();
          for (let x = 0; x <= canvas.width; x += 24) {
            ctx.lineTo(x, y + Math.sin((x + y) / 18) * 4);
          }
          ctx.stroke();
        }
      });

      // 돌다리(가운데)
      ditherGround(ctx, 0, 110, canvas.width, 120, "#9a958a", "#7d786c", 18);

      // 다리 양 끝 돌 난간(장식)
      for (let x = 10; x < canvas.width; x += 36) {
        pixelBlock(ctx, x, 112, 14, 10, "#8a857a", { outline: false });
        pixelBlock(ctx, x, 218, 14, 10, "#8a857a", { outline: false });
      }

      // 이끼 자국(장식)
      pixelCircle(ctx, 90, 140, 10, "#6b8a5a", { outline: false });
      pixelCircle(ctx, 250, 200, 12, "#6b8a5a", { outline: false });
      pixelCircle(ctx, 380, 150, 9, "#6b8a5a", { outline: false });

      // 오른쪽 끝은 다리가 끊겨있는 무너진 돌더미(장식 — 여기서 더 갈 수 없다는 느낌)
      pixelBlock(ctx, 450, 130, 16, 16, "#7d786c", { outline: false });
      pixelBlock(ctx, 458, 195, 14, 18, "#7d786c", { outline: false });

      // 왼쪽 끝 돌길: 여기로 걸어나가면 논두렁과 돌다리를 잇는 길로 이어짐
      ditherGround(ctx, 0, 110, 20, 120, "#9a958a", "#7d786c", 18);
    }

    const bgCanvas = document.createElement("canvas");
    bgCanvas.width = canvas.width;
    bgCanvas.height = canvas.height;
    drawBridge(bgCanvas.getContext("2d"));

    function drawItemHint() {
      if (!nearItem && approachItem) {
        const t = (Date.now() % 1400) / 1400;
        const alpha = 0.15 + Math.sin(t * Math.PI * 2) * 0.1;
        ctx.globalAlpha = Math.max(0.05, alpha);
        pixelCircle(ctx, approachItem.x, approachItem.y - 20, 5, "#fff7c2");
        ctx.globalAlpha = 1;
      }

      if (!nearItem) return;
      ctx.fillStyle = "#fff7c2";
      ctx.font = "bold 13px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("스페이스바로 줍기", nearItem.x, nearItem.y - 40);
      const t = (Date.now() % 600) / 600;
      const r = 5 + Math.sin(t * Math.PI * 2) * 2.5;
      pixelCircle(ctx, nearItem.x, nearItem.y - 25, r, "#fff04d");
    }

    function draw() {
      ctx.drawImage(bgCanvas, 0, 0);
      drawItemHint();
      drawCharacter(ctx, player.x, player.y, player.direction, player.walkFrame, player.crouching);

      if (items.every(i => i.collected)) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
        ctx.fillStyle = "white";
        ctx.font = "14px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("이 곳의 추억을 모두 모았어!", canvas.width / 2, canvas.height - 16);
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
