<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>세계 탐험</title>
<style>
  body { background: #060e1c; display: flex; flex-direction: column; align-items: center;
         color: white; font-family: sans-serif; margin: 0; padding: 0; }
  h2   { margin: 14px 0 0; letter-spacing: 3px; color: #c8dff0; font-size: 20px; }
  canvas { margin-top: 12px; }
  a    { color: #7bc; margin-top: 10px; font-size: 13px; }
</style>
</head>
<body>
<h2>🌍 세계 탐험</h2>
<canvas id="map" width="640" height="420"></canvas>
<a href="../index.html">← 게임 목록으로</a>
<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

// ── 진행 저장 ──────────────────────────────────────────────────────────────
const SAVE_KEY = "wdttjw_world_explorer";
function loadProgress() { try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || {}; } catch { return {}; } }
let progress = loadProgress();

// ── 나라 정의 ──────────────────────────────────────────────────────────────
const COUNTRIES = [
  { id:"usa",    name:"미국",   city:"뉴욕",   genre:"웹 스윙",    emoji:"🗽",
    x:150, y:148, color:"#3a6ea5", file:"country-usa.html",
    desc:"마천루를 스윙으로 누벼라!", unlockAfter:null },
  { id:"japan",  name:"일본",   city:"도쿄",   genre:"닌자 벽타기", emoji:"⛩️",
    x:538, y:128, color:"#9b2335", file:"country-japan.html",
    desc:"닌자처럼 벽을 타고 올라라!", unlockAfter:null },
  { id:"egypt",  name:"이집트", city:"카이로", genre:"피라미드 호퍼", emoji:"🏛️",
    x:368, y:202, color:"#c4962a", file:"country-egypt.html",
    desc:"피라미드를 뛰어넘어라!", unlockAfter:"usa" },
  { id:"brazil", name:"브라질", city:"아마존", genre:"정글 스윙",   emoji:"🌴",
    x:218, y:296, color:"#2a7d40", file:"country-brazil.html",
    desc:"정글 덩굴을 타고 탈출하라!", unlockAfter:"japan" },
];

// ── 대륙 다각형 ────────────────────────────────────────────────────────────
const CONTINENTS = [
  // 북아메리카
  [[48,42],[192,42],[210,80],[196,158],[166,228],[120,248],[72,228],[42,168],[36,102]],
  // 남아메리카
  [[148,244],[252,244],[272,304],[256,380],[208,406],[150,384],[128,320],[126,264]],
  // 유럽
  [[272,42],[368,42],[388,90],[360,132],[312,142],[276,112],[266,74]],
  // 아프리카
  [[274,142],[416,142],[432,198],[420,298],[388,386],[342,406],[294,384],[272,298],[260,198]],
  // 아시아
  [[364,42],[628,42],[628,200],[558,220],[456,212],[398,164],[372,90]],
  // 오스트레일리아
  [[490,264],[604,254],[624,360],[574,408],[488,398],[462,336]],
];

function isUnlocked(c) {
  if (!c.unlockAfter) return true;
  return !!progress[c.unlockAfter];
}

// ── 색상 유틸 ──────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function lighten(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  const c = v => Math.min(255, v + amt).toString(16).padStart(2,"0");
  return `#${c(r)}${c(g)}${c(b)}`;
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── 마우스 ─────────────────────────────────────────────────────────────────
let hovered = null;
let pulseT = 0;

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width  / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
  hovered = null;
  for (const c of COUNTRIES) {
    if (Math.hypot(mx - c.x, my - c.y) < 28) { hovered = c; break; }
  }
  canvas.style.cursor = (hovered && isUnlocked(hovered)) ? "pointer" : "default";
});

canvas.addEventListener("click", () => {
  if (hovered && isUnlocked(hovered)) window.location.href = hovered.file;
});

// ── 그리기 ─────────────────────────────────────────────────────────────────
function draw() {
  pulseT += 0.04;
  progress = loadProgress(); // 귀환 시 최신 진행도 반영

  // 바다
  const ocean = ctx.createLinearGradient(0, 0, 0, canvas.height);
  ocean.addColorStop(0, "#070e1e"); ocean.addColorStop(1, "#0c2040");
  ctx.fillStyle = ocean;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 경위선 격자
  ctx.strokeStyle = "rgba(100,160,220,0.06)"; ctx.lineWidth = 1;
  for (let x = 0; x < canvas.width; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for (let y = 0; y < canvas.height; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  // 대륙
  for (const pts of CONTINENTS) {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = "#1c3d28"; ctx.fill();
    ctx.strokeStyle = "#264f32"; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // 나라 마커
  for (const c of COUNTRIES) {
    const unlocked = isUnlocked(c);
    const cleared  = !!progress[c.id];
    const isHov    = hovered === c;
    const r = isHov ? 27 : 23;

    // 미클리어 언락 → 펄스 링
    if (unlocked && !cleared) {
      const pulse = 0.3 + 0.2 * Math.sin(pulseT);
      ctx.beginPath(); ctx.arc(c.x, c.y, r + 10, 0, Math.PI * 2);
      const [cr,cg,cb] = hexToRgb(c.color);
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${pulse})`;
      ctx.fill();
    }

    // 그림자 글로우 (호버)
    if (isHov && unlocked) { ctx.shadowColor = c.color; ctx.shadowBlur = 22; }

    // 원
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    if (unlocked) {
      const g = ctx.createRadialGradient(c.x - r*.3, c.y - r*.3, 0, c.x, c.y, r);
      g.addColorStop(0, lighten(c.color, 50)); g.addColorStop(1, c.color);
      ctx.fillStyle = cleared ? "#1e6e44" : g;
    } else {
      ctx.fillStyle = "#1a2030";
    }
    ctx.fill();
    ctx.strokeStyle = cleared ? "#50ff99" : (unlocked ? "rgba(255,255,255,0.8)" : "#2a3448");
    ctx.lineWidth = cleared ? 2.5 : 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 아이콘
    ctx.font = "14px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(cleared ? "✓" : (unlocked ? c.emoji : "🔒"), c.x, c.y + 1);

    // 이름 라벨
    ctx.font = "bold 10px sans-serif"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = unlocked ? "rgba(255,255,255,0.9)" : "#445";
    ctx.fillText(c.name, c.x, c.y + r + 14);
  }

  // 툴팁
  if (hovered) {
    const c = hovered;
    const unlocked = isUnlocked(c);
    const cleared  = !!progress[c.id];
    const tw = 210, th = 82;
    let tx = c.x - tw/2, ty = c.y - 30 - th;
    if (ty < 4) ty = c.y + 32;
    if (tx < 4) tx = 4;
    if (tx + tw > canvas.width - 4) tx = canvas.width - tw - 4;

    ctx.fillStyle = "rgba(6,12,26,0.96)";
    ctx.strokeStyle = unlocked ? c.color : "#2a3448"; ctx.lineWidth = 1.5;
    roundRect(tx, ty, tw, th, 8); ctx.fill(); ctx.stroke();

    ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
    ctx.font = "bold 13px sans-serif";
    ctx.fillStyle = unlocked ? "#f0ecd8" : "#556";
    ctx.fillText(`${c.emoji} ${c.name} — ${c.city}`, tx + 10, ty + 22);

    ctx.font = "11px sans-serif"; ctx.fillStyle = "#889";
    ctx.fillText("장르: " + c.genre, tx + 10, ty + 40);

    if (cleared) {
      ctx.fillStyle = "#50ff99";
      ctx.fillText("✓ 클리어 완료!", tx + 10, ty + 60);
    } else if (unlocked) {
      ctx.fillStyle = "#aad4f5";
      ctx.fillText(c.desc, tx + 10, ty + 58);
      ctx.font = "10px sans-serif"; ctx.fillStyle = "#667";
      ctx.fillText("▶ 클릭해서 입장", tx + 10, ty + 72);
    } else {
      const blocker = COUNTRIES.find(x => x.id === c.unlockAfter);
      ctx.fillStyle = "#c88";
      ctx.fillText(`🔒 ${blocker.name} 클리어 후 해금`, tx + 10, ty + 58);
    }
  }

  // 전체 클리어
  if (COUNTRIES.every(c => progress[c.id])) {
    ctx.fillStyle = "rgba(0,0,0,0.55)";
    ctx.fillRect(0, canvas.height - 46, canvas.width, 46);
    ctx.textAlign = "center"; ctx.font = "bold 19px sans-serif";
    ctx.fillStyle = "#ffd700";
    ctx.fillText("🌟 세계 탐험 완료! 모든 나라를 정복했습니다!", canvas.width / 2, canvas.height - 14);
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
